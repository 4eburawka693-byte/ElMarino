<!DOCTYPE html>
<html lang="uk" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ElMarino Магазин</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pinch-zoom-js@2.3.4/dist/pinch-zoom.umd.min.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; }
        .product-card { transition: all 0.2s ease; cursor: pointer; }
        .product-card:active { transform: scale(0.98); }
        .clamp-desc {
            display: -webkit-box !important;
            -webkit-line-clamp: 2 !important;
            -webkit-box-orient: vertical !important;
            overflow: hidden !important;
            text-overflow: ellipsis !important;
        }
        .pinch-zoom-container {
            width: 100%;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .zoomable-img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
        }
    </style>
</head>
<body class="bg-gray-100 notranslate">

<div class="max-w-4xl mx-auto pb-20">
    <div class="w-full overflow-hidden shadow-sm">
        <img src="https://i.postimg.cc/KvynpRrT/1782584017691.jpg" alt="ElMarino Banner" class="w-full h-auto object-cover block" loading="eager">
    </div>

    <header class="bg-purple-700 text-white p-4 sticky top-0 z-40 shadow">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-bold">🛍️ ElMarino Магазин</h1>
            <button onclick="showCart()" class="flex items-center gap-2 bg-white text-purple-700 px-5 py-2 rounded-2xl font-medium">
                🛒 <span id="cart-count" class="bg-red-500 text-white text-xs rounded-full px-2 py-0.5">0</span>
            </button>
        </div>
    </header>

    <div class="p-4 flex gap-2">
        <input id="search" type="text" placeholder="🔍 Пошук товарів..." 
               class="w-full p-4 rounded-2xl border focus:border-purple-600 outline-none shadow-sm" 
               onkeyup="filterProducts()">
        <button onclick="resetFilters()" class="bg-gray-200 text-gray-700 px-4 rounded-2xl text-sm font-medium hover:bg-gray-300">Всі</button>
    </div>

    <div id="loading-status" class="text-center py-10 text-gray-500 font-medium">
        ⏳ Завантаження товарів та актуальних цін...
    </div>

    <div id="categories" class="px-4 mb-6 grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
    <div id="products" class="px-4 grid grid-cols-2 gap-4"></div>
</div>

<div id="product-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-3" onclick="hideProductModal()">
    <div class="bg-white w-full max-w-md rounded-3xl overflow-hidden shadow-2xl relative max-h-[85vh] flex flex-col" onclick="event.stopPropagation()">
        
        <button onclick="hideProductModal()" class="absolute top-4 right-4 bg-black/60 text-white w-9 h-9 rounded-full flex items-center justify-center text-sm font-bold z-50 shadow-lg border border-white/20">✕</button>
        
        <div class="overflow-y-auto p-0 flex-1 pb-24">
            <div class="w-full h-64 bg-gray-50 flex items-center justify-center overflow-hidden relative cursor-zoom-in" onclick="openFullscreenPhoto()">
                <img id="modal-product-image" src="" class="max-w-full max-h-full object-contain" onerror="this.src='https://images.unsplash.com/photo-1594035910387-fea47794261f?w=400&q=60'">
                <button id="prev-photo-btn" onclick="changePhoto(-1); event.stopPropagation();" class="absolute left-3 bg-black/40 text-white w-9 h-9 rounded-full flex items-center justify-center font-bold text-lg active:bg-black/60 select-none">＜</button>
                <button id="next-photo-btn" onclick="changePhoto(1); event.stopPropagation();" class="absolute right-3 bg-black/40 text-white w-9 h-9 rounded-full flex items-center justify-center font-bold text-lg active:bg-black/60 select-none">＞</button>
                <span id="photo-counter" class="absolute bottom-3 right-3 bg-black/60 text-white text-xs px-2.5 py-1 rounded-full font-medium"></span>
            </div>

            <div class="p-4">
                <span id="modal-product-category" class="text-xs font-bold uppercase tracking-wider text-purple-600 bg-purple-50 px-2.5 py-1 rounded-md"></span>
                <h2 id="modal-product-name" class="text-xl font-bold text-gray-800 mt-3 leading-tight"></h2>
                <p id="modal-product-description" class="text-gray-600 text-sm mt-2 whitespace-pre-line"></p>
                
                <div id="size-selector-block" class="hidden mt-4 flex items-center gap-3 bg-gray-50 p-2 rounded-xl justify-between">
                    <span class="text-gray-600 font-medium text-sm pl-2">Оберіть розмір:</span>
                    <select id="modal-size-select" class="p-2 rounded-lg border bg-white font-bold text-gray-700 outline-none focus:border-purple-600 min-w-[140px]"></select>
                </div>

                <div id="color-selector-block" class="hidden mt-4 flex items-center gap-3 bg-gray-50 p-2 rounded-xl justify-between">
                    <span class="text-gray-600 font-medium text-sm pl-2">Оберіть колір:</span>
                    <select id="modal-color-select" class="p-2 rounded-lg border bg-white font-bold text-gray-700 outline-none focus:border-purple-600 min-w-[140px]"></select>
                </div>
                
                <div class="mt-4 flex items-center gap-3 bg-gray-50 p-2 rounded-xl justify-between">
                    <span class="text-gray-600 font-medium text-sm pl-2">Кількість:</span>
                    <div class="flex items-center gap-1">
                        <button onclick="changeModalQty(-1)" class="w-10 h-10 bg-white rounded-lg border font-bold text-xl active:bg-gray-100 shadow-sm">-</button>
                        <span id="modal-qty" class="w-12 text-center font-bold text-lg">1</span>
                        <button onclick="changeModalQty(1)" class="w-10 h-10 bg-white rounded-lg border font-bold text-xl active:bg-gray-100 shadow-sm">+</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 right-0 bg-white border-t p-4 flex items-center justify-between gap-4 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-20">
            <div>
                <span class="text-gray-400 text-xs block">Ціна</span>
                <span id="modal-product-price" class="text-xl font-black text-purple-700"></span>
            </div>
            <button id="modal-product-btn" class="flex-1 bg-purple-700 hover:bg-purple-800 text-white py-3.5 rounded-2xl font-semibold transition-colors shadow-lg shadow-purple-700/20 text-center">
                Додати в кошик
            </button>
        </div>
    </div>
</div>

<div id="fullscreen-lightbox" class="hidden fixed inset-0 bg-black/95 z-[60] flex flex-col items-center justify-center p-4" onclick="closeFullscreenPhoto()">
    <button onclick="closeFullscreenPhoto()" class="fixed top-6 right-6 text-white text-3xl font-light hover:text-gray-300 z-[70] bg-black/40 w-12 h-12 rounded-full flex items-center justify-center">✕</button>
    <div id="lightbox-content-area" class="w-full flex items-center justify-center"></div>
    <button id="lightbox-prev-btn" onclick="changePhoto(-1); updateLightboxImage(); event.stopPropagation();" class="fixed left-2 top-1/2 -translate-y-1/2 bg-black/40 text-white w-12 h-12 rounded-full flex items-center justify-center font-bold text-xl select-none z-[65]">＜</button>
    <button id="lightbox-next-btn" onclick="changePhoto(1); updateLightboxImage(); event.stopPropagation();" class="fixed right-2 top-1/2 -translate-y-1/2 bg-black/40 text-white w-12 h-12 rounded-full flex items-center justify-center font-bold text-xl select-none z-[65]">＞</button>
</div>

<div id="cart-modal" class="hidden fixed inset-0 bg-black/70 flex items-end z-50">
    <div class="bg-white w-full rounded-t-3xl max-h-[85vh] overflow-auto p-5">
        <div class="flex justify-between mb-6">
            <h2 class="text-2xl font-bold">Кошик</h2>
            <button onclick="hideCart()" class="text-3xl">✕</button>
        </div>
        <div id="cart-items" class="space-y-4"></div>
        <div class="mt-8 border-t pt-6">
            <div class="flex justify-between text-xl font-bold">
                <span>Разом:</span>
                <span id="cart-total">0 грн</span>
            </div>
            <button onclick="placeOrder()" class="mt-6 w-full bg-green-600 text-white py-5 rounded-3xl text-lg font-medium">
                Оформити замовлення
            </button>
        </div>
    </div>
</div>

<script>
const SHEET_ID = '1SyxBE2iwqqt-JtEZ8N9vkdrtxUUcxtv_goVA878TMog';
const SPREADSHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

let allProducts = [];
let cart = [];
let currentModalQty = 1;
let currentPhotos = [];
let currentPhotoIndex = 0;
let currentProductIndex = null;

window.addEventListener('popstate', function () {
    const modalOpen = !document.getElementById('product-modal').classList.contains('hidden');
    const cartOpen = !document.getElementById('cart-modal').classList.contains('hidden');
    const lightboxOpen = !document.getElementById('fullscreen-lightbox').classList.contains('hidden');

    if (lightboxOpen) {
        closeFullscreenPhoto();
        history.pushState(null, null, window.location.pathname);
    } else if (modalOpen) {
        hideProductModal(true);
    } else if (cartOpen) {
        hideCart(true);
    }
});

async function loadProductsFromSheet() {
    try {
        const response = await fetch(SPREADSHEET_URL);
        const csvText = await response.text();
        
        const parseCSV = (text) => {
            let p = '', r = [];
            let q = false;
            let row = [''];
            for (let i=0; i<text.length; i++) {
                let c = text[i];
                if (c === '"') { q = !q; continue; }
                if (c === ',' && !q) { row.push(''); continue; }
                if ((c === '\n' || c === '\r') && !q) {
                    if (c === '\n' && text[i-1] === '\r') continue;
                    r.push(row); row = ['']; continue;
                }
                row[row.length-1] += c;
            }
            if (row.length > 1 || row[0] !== '') r.push(row);
            return r;
        };

        const rows = parseCSV(csvText);
        allProducts = [];
        
        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if (row && row[0]) { 
                let imagesArray = [];
                if (row[4]) {
                    imagesArray = row[4].split(',').map(url => url.trim()).filter(Boolean);
                }

                allProducts.push({
                    name: row[0].trim(),
                    category: row[1] ? row[1].trim() : 'Інше',
                    price: row[2] ? row[2].trim() : '0,00',
                    description: row[3] ? row[3].trim() : '',
                    images: imagesArray
                });
            }
        }

        document.getElementById('loading-status').classList.add('hidden');
        renderCategories();
        renderProducts(allProducts);
    } catch (error) {
        console.error('Помилка завантаження:', error);
        document.getElementById('loading-status').innerHTML = '❌ Не вдалося завантажити товари.';
    }
}

function renderCategories() {
    const cats = [];
    allProducts.forEach(p => {
        if (p.category && !cats.includes(p.category)) {
            cats.push(p.category);
        }
    });

    let html = '';
    cats.forEach(cat => {
        html += `<div onclick="filterByCategory('${cat}')" class="bg-white p-3 rounded-2xl shadow-sm text-center text-xs font-semibold cursor-pointer active:bg-purple-100 border hover:border-purple-300 transition-colors">${cat}</div>`;
    });
    document.getElementById('categories').innerHTML = html;
}

function renderProducts(products) {
    let html = '';
    products.forEach((p) => {
        const realIndex = allProducts.findIndex(item => item.name === p.name);
        const mainImage = p.images.length > 0 ? p.images[0] : 'https://images.unsplash.com/photo-1594035910387-fea47794261f?w=300&q=60';
        
        html += `
            <div onclick="showProductDetails(${realIndex})" class="product-card bg-white rounded-3xl overflow-hidden shadow-sm border flex flex-col justify-between">
                <div>
                    <div class="w-full h-40 bg-gray-50 flex items-center justify-center overflow-hidden">
                        <img src="${mainImage}" class="max-w-full max-h-full object-contain" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1594035910387-fea47794261f?w=300&q=60'">
                    </div>
                    <div class="p-3">
                        <h3 class="font-medium text-sm text-gray-800" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${p.name}</h3>
                        <p class="text-gray-500 text-xs mt-1 min-h-[32px] clamp-desc">${p.description || ''}</p>
                    </div>
                </div>
                <div class="p-3 pt-0">
                    <p class="text-purple-700 font-bold text-lg">${p.price} грн</p>
                    <button onclick="addToCartFromList(${realIndex}); event.stopPropagation();" 
                            class="mt-2 w-full bg-purple-700 active:bg-purple-800 text-white py-2.5 rounded-xl text-sm font-medium transition-colors">В кошик</button>
                </div>
            </div>`;
    });
    document.getElementById('products').innerHTML = html || '<p class="col-span-2 text-center py-10 text-gray-500">Нічого не знайдено</p>';
}

function parseSizePrice(sizeStr, defaultPrice) {
    let priceMatch = sizeStr.match(/\(([^)]+)\)/);
    let sizeName = sizeStr.replace(/\s*\([^)]+\)\s*/g, '').trim();
    let price = defaultPrice.replace(',', '.');

    if (priceMatch && priceMatch[1]) {
        let cleanPrice = priceMatch[1].replace(/[^\d.,]/g, '').replace(',', '.').trim();
        if (cleanPrice && !isNaN(parseFloat(cleanPrice))) {
            price = parseFloat(cleanPrice).toFixed(2);
        }
    }
    return { sizeName, price: parseFloat(price).toFixed(2).replace('.', ',') };
}

function extractSizesFromDescription(description) {
    if (!description) return [];
    const sizeMatch = description.match(/(?:розмір|розміри|размер|размеры|модель|моделі)\s*:\s*([^\n\r.]+)/i);
    if (sizeMatch && sizeMatch[1]) {
        const rawContent = sizeMatch[1].trim();
        if (rawContent.length > 60) return [];
        return rawContent.split(',').map(s => s.trim()).filter(Boolean);
    }
    return [];
}

function addToCartFromList(index) {
    const p = allProducts[index];
    const catLower = p.category.toLowerCase().trim();
    const parsedSizes = extractSizesFromDescription(p.description);
    
    let defaultSize = null;
    let basePrice = p.price;

    if (parsedSizes.length > 0) {
        let parsed = parseSizePrice(parsedSizes[0], p.price);
        defaultSize = parsed.sizeName;
        basePrice = parsed.price;
    } else if (catLower === 'взуття') {
        defaultSize = '36';
    }

    const colorMatch = p.description.match(/(?:колір|кольори|цвет|цвета)\s*:\s*([^\n\r.]+)/i);
    let defaultColor = null;
    if (colorMatch && colorMatch[1]) {
        let colors = colorMatch[1].split(',').map(c => c.trim()).filter(Boolean);
        if (colors.length > 0) defaultColor = colors[0];
    }

    addToCart(index, 1, defaultSize, defaultColor, basePrice);
}

function showProductDetails(index) {
    currentProductIndex = index;
    const p = allProducts[index];
    currentModalQty = 1;
    document.getElementById('modal-qty').textContent = currentModalQty;
    
    currentPhotos = p.images.length > 0 ? p.images : ['https://images.unsplash.com/photo-1594035910387-fea47794261f?w=400&q=60'];
    currentPhotoIndex = 0;

    document.getElementById('modal-product-category').textContent = p.category;
    document.getElementById('modal-product-name').textContent = p.name;
    document.getElementById('modal-product-description').textContent = p.description || 'Опис відсутній';
    
    const sizeSelect = document.getElementById('modal-size-select');
    const sizeBlock = document.getElementById('size-selector-block');
    const colorSelect = document.getElementById('modal-color-select');
    const colorBlock = document.getElementById('color-selector-block');
    
    const catLower = p.category.toLowerCase().trim();
    const parsedSizes = extractSizesFromDescription(p.description);
    
    sizeSelect.onchange = updateModalPrice;
    sizeSelect.oninput = updateModalPrice;
    
    if (parsedSizes.length > 0) {
        sizeBlock.classList.remove('hidden');
        sizeSelect.innerHTML = parsedSizes.map(s => {
            let parsed = parseSizePrice(s, p.price);
            return `<option value="${parsed.sizeName}" data-price="${parsed.price}">${s}</option>`;
        }).join('');
    } else if (catLower === 'взуття') {
        sizeBlock.classList.remove('hidden');
        let defaultSizes = ['36', '37', '38', '39', '40', '41'];
        sizeSelect.innerHTML = defaultSizes.map(s => `<option value="${s}" data-price="${p.price}">${s}</option>`).join('');
    } else {
        sizeBlock.classList.add('hidden');
        sizeSelect.innerHTML = '';
    }

    // РАЗБОР ЦВЕТОВ И СВЯЗЫВАНИЕ С КАРТИНКАМИ
    const colorMatch = p.description.match(/(?:колір|кольори|цвет|цвета)\s*:\s*([^\n\r.]+)/i);
    if (colorMatch && colorMatch[1]) {
        colorBlock.classList.remove('hidden');
        let colors = colorMatch[1].split(',').map(c => c.trim()).filter(Boolean);
        // Каждому цвету даем data-index, соответствующий номеру картинки
        colorSelect.innerHTML = colors.map((c, idx) => `<option value="${c}" data-index="${idx}">${c}</option>`).join('');
    } else {
        colorBlock.classList.add('hidden');
        colorSelect.innerHTML = '';
    }

    // Событие: когда пользователь сам МЕНЯЕТ ЦВЕТ в выпадающем списке
    colorSelect.onchange = function() {
        if (colorSelect.selectedOptions.length > 0) {
            let photoIdx = parseInt(colorSelect.selectedOptions[0].getAttribute('data-index'));
            // Если для этого цвета есть картинка, переключаем на неё
            if (!isNaN(photoIdx) && currentPhotos[photoIdx]) {
                currentPhotoIndex = photoIdx;
                updateModalPhoto();
            }
        }
    };
    
    updateModalPhoto();
    updateModalPrice();
    
    document.getElementById('modal-product-btn').onclick = function() {
        let chosenSize = (!sizeBlock.classList.contains('hidden')) ? sizeSelect.value : null;
        let chosenColor = (!colorBlock.classList.contains('hidden')) ? colorSelect.value : null;
        
        let activePrice = p.price;
        if (chosenSize && sizeSelect.selectedOptions.length > 0) {
            activePrice = sizeSelect.selectedOptions[0].getAttribute('data-price');
        }
        
        addToCart(index, currentModalQty, chosenSize, chosenColor, activePrice);
        hideProductModal();
    };
    
    history.pushState({modal: "product"}, null, null);
    document.getElementById('product-modal').classList.remove('hidden');
}

function updateModalPrice() {
    if (currentProductIndex === null) return;
    const p = allProducts[currentProductIndex];
    const sizeSelect = document.getElementById('modal-size-select');
    const sizeBlock = document.getElementById('size-selector-block');
    
    let activePrice = p.price;
    if (!sizeBlock.classList.contains('hidden') && sizeSelect.selectedOptions.length >
