<script>
const SHEET_ID = '1SyxBE2iwqqt-JtEZ8N9vkdrtxUUcxtv_goVA878TMog';
const SPREADSHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

let allProducts = [];
let cart = [];
let currentModalQty = 1;
let currentPhotos = [];
let currentPhotoIndex = 0;
let currentProductIndex = null;

let selectedCategory = null;
let selectedSubcategory = null; // Нова змінна для підкатегорії
let currentSearchTerm = "";
let currentSortOrder = "default"; 

let touchStartX = 0;
let touchEndX = 0;

function parseOptionsField(optionsStr) {
  let result = { sizeLabel: 'Оберіть розмір:', sizes: [], colors: [] };
  if (!optionsStr || optionsStr.trim() === "") return result;

  const match = optionsStr.match(/([^\n\r]+?)\s*:\s*([^\n\r]+)/);
  if (match && match[1] && match[2]) {
    let rawLabel = match[1].trim();
    let rawValues = match[2].trim();

    if (/колір|кольори|цвет|цвета/i.test(rawLabel)) {
      result.colors = rawValues.split(',').map(c => c.trim()).filter(Boolean);
    } else {
      let cleanLabel = rawLabel.charAt(0).toUpperCase() + rawLabel.slice(1);
      result.sizeLabel = `Оберіть ${cleanLabel.toLowerCase()}:`;
      result.sizes = rawValues.split(',').map(s => s.trim()).filter(Boolean);
    }
  }
  return result;
}

function parseSizePrice(sizeStr, defaultPrice) {
let priceMatch = sizeStr.match(/\(([^)]+)\)/);
let sizeName = sizeStr.replace(/\s*\([^)]+\)\s*/g, '').trim();
let price = String(defaultPrice).replace(/\s/g, '').replace(',', '.');

if (priceMatch && priceMatch[1]) {
let cleanPrice = priceMatch[1].replace(/[^\d.,]/g, '').replace(',', '.').trim();
if (cleanPrice && !isNaN(parseFloat(cleanPrice))) {
price = parseFloat(cleanPrice).toFixed(2);
}
}
return { sizeName, price: parseFloat(price).toFixed(2).replace('.', ',') };
}

window.addEventListener('popstate', function () {
const modalOpen = !document.getElementById('product-modal').classList.contains('hidden');
const cartOpen = !document.getElementById('cart-modal').classList.contains('hidden');
const lightboxOpen = !document.getElementById('fullscreen-lightbox').classList.contains('hidden');
const checkoutOpen = !document.getElementById('checkout-modal').classList.contains('hidden');

if (lightboxOpen) {
closeFullscreenPhoto();
history.pushState(null, null, window.location.pathname);
} else if (checkoutOpen) {
hideCheckoutModal(true);
} else if (modalOpen) {
hideProductModal(true);
} else if (cartOpen) {
hideCart(true);
}
});

document.addEventListener('click', function(e) {
const menu = document.getElementById('sort-menu');
if (menu && !menu.classList.contains('hidden') && !e.target.closest('.relative')) {
menu.classList.add('hidden');
}
});

function showToast(message, type = 'success') {
const toast = document.createElement('div');
toast.className = 'notranslate';
const bg = type === 'success' ? '#10b981' : '#ef4444';
toast.style.cssText = `position:fixed;top:20px;left:50%;transform:translateX(-50%);background:${bg};color:white;padding:14px 24px;border-radius:20px;box-shadow:0 10px 25px -5px rgba(0,0,0,0.2);z-index:100;font-weight:600;text-align:center;max-width:90%;font-size:14px;transition:all 0.3s ease;`;
toast.textContent = message;
document.body.appendChild(toast);
setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2500);
}

async function loadProductsFromSheet() {
try {
const response = await fetch(SPREADSHEET_URL);
if (!response.ok) throw new Error(`Помилка: ${response.status}`);
const csvText = await response.text();

const parseCSV = (text) => {
let p = '', r = [];
let q = false;
let row = [''];
for (let i=0; i<text.length; i++) {
let c = text[i];
if (c === '"') { q = !q; continue; }
if (c === ',' && !q) { row.push(''); continue; }
if ((c === '\n' || c === '\r') && !q) {
if (c === '\n' && text[i-1] === '\r') continue;
r.push(row); row = ['']; continue;
}
row[row.length-1] += c;
}
if (row.length > 1 || row[0] !== '') r.push(row);
return r;
};

let rows = parseCSV(csvText);
allProducts = [];

for (let i = 1; i < rows.length; i++) {
const row = rows[i];
if (row && row[0] && row[0].trim() !== '') {
let imagesArray = [];
if (row[4]) {
imagesArray = row[4].split(',').map(url => url.trim()).filter(Boolean);
}
let safePrice = row[2] ? row[2].trim() : '0,00';

// Розбираємо Колонку B на Головну категорію та Підкатегорію
let rawCategory = row[1] ? row[1].trim() : 'Інше';
let categoryPart = rawCategory;
let subcategoryPart = null;

if (rawCategory.includes('/')) {
  let parts = rawCategory.split('/');
  categoryPart = parts[0].trim();
  subcategoryPart = parts[1].trim();
}

allProducts.push({
name: row[0].trim(),
category: categoryPart,
subcategory: subcategoryPart,
price: safePrice,
description: row[3] ? row[3].trim() : '',
images: imagesArray,
optionsField: row[5] ? row[5].trim() : ''
});
}
}

renderCategories();
applyFilterAndSort();
initSwipeListeners();
} catch (error) {
console.error(error);
}
}

// Функція малювання головних категорій
function renderCategories() {
const cats = [];
allProducts.forEach(p => {
if (p.category && !cats.includes(p.category)) cats.push(p.category);
});

let html = '';
cats.forEach(cat => {
const activeStyle = (cat === selectedCategory) ? 'border-zinc-800 bg-zinc-800 font-bold text-white scale-[1.02]' : 'bg-white text-zinc-700';
html += `<div onclick="filterByCategory('${cat}')" class="${activeStyle} p-3 rounded-2xl shadow-sm text-center text-xs font-semibold cursor-pointer border hover:border-zinc-400 transition-all">${cat}</div>`;
});
document.getElementById('categories').innerHTML = html;

renderSubcategories();
}

// Функція малювання підкатегорій (показується тільки тоді, коли обрано головну категорію)
function renderSubcategories() {
const subContainer = document.getElementById('subcategories');
if (!selectedCategory) {
subContainer.classList.add('hidden');
return;
}

// Збираємо підкатегорії для обраної головної категорії
const subcats = [];
allProducts.forEach(p => {
if (p.category === selectedCategory && p.subcategory && !subcats.includes(p.subcategory)) {
subcats.push(p.subcategory);
}
});

if (subcats.length === 0) {
subContainer.classList.add('hidden');
return;
}

subContainer.classList.remove('hidden');
let html = '';
subcats.forEach(sub => {
const activeStyle = (sub === selectedSubcategory) ? 'border-amber-500 bg-amber-500 font-bold text-white' : 'bg-white text-zinc-600';
html += `<div onclick="filterBySubcategory('${sub}')" class="${activeStyle} p-2 rounded-xl text-center text-xs font-medium cursor-pointer border shadow-sm transition-all">${sub}</div>`;
});
subContainer.innerHTML = html;
}

function applyFilterAndSort() {
let filtered = [...allProducts];

// Фільтр по категорії
if (selectedCategory) {
filtered = filtered.filter(p => p.category === selectedCategory);
}
// Фільтр по підкатегорії
if (selectedSubcategory) {
filtered = filtered.filter(p => p.subcategory === selectedSubcategory);
}

if (currentSearchTerm) {
filtered = filtered.filter(p => p.name.toLowerCase().includes(currentSearchTerm) || (p.description && p.description.toLowerCase().includes(currentSearchTerm)));
}
if (currentSortOrder === 'low-to-high') {
filtered.sort((a, b) => parseFloat(a.price.replace(',', '.')) - parseFloat(b.price.replace(',', '.')));
} else if (currentSortOrder === 'high-to-low') {
filtered.sort((a, b) => parseFloat(b.price.replace(',', '.')) - parseFloat(a.price.replace(',', '.')));
}
updateFilterIndicator();
renderProducts(filtered);
}

function renderProducts(products) {
let html = '';
products.forEach((p) => {
const realIndex = allProducts.findIndex(item => item.name === p.name);
const mainImage = p.images.length > 0 ? p.images[0] : 'https://images.unsplash.com/photo-1594035910387-fea47794261f?w=300&q=60';
html += `<div onclick="showProductDetails(${realIndex})" class="product-card bg-white rounded-3xl overflow-hidden shadow-sm border flex flex-col justify-between">
<div>
<div class="w-full h-40 bg-zinc-50 flex items-center justify-center overflow-hidden">
<img src="${mainImage}" class="max-w-full max-h-full object-contain">
</div>
<div class="p-3">
<h3 class="text-sm font-bold text-zinc-800 leading-tight line-clamp-2 min-h-[40px]">${p.name}</h3>
<p class="text-zinc-500 text-xs mt-1 min-h-[32px] clamp-desc">${p.description}</p>
</div>
</div>
<div class="p-3 pt-0">
<p class="text-zinc-800 font-black text-base">${p.price} грн</p>
<button onclick="addToCartFromList(${realIndex}); event.stopPropagation();" class="mt-2 w-full bg-zinc-800 text-white py-2.5 rounded-xl text-sm font-bold transition-all active:bg-zinc-700">В кошик</button>
</div>
</div>`;
});
document.getElementById('products').innerHTML = html || '<p class="col-span-2 text-center py-10 text-zinc-500">Товарів не знайдено</p>';
}

function toggleSortMenu() { document.getElementById('sort-menu').classList.toggle('hidden'); }
function setSortOrder(order) { currentSortOrder = order; document.getElementById('sort-menu').classList.add('hidden'); applyFilterAndSort(); }

function filterByCategory(cat) { 
if (selectedCategory === cat) {
selectedCategory = null;
selectedSubcategory = null;
} else {
selectedCategory = cat;
selectedSubcategory = null; // Скидаємо підкатегорію при зміні категорії
}
renderCategories();
applyFilterAndSort(); 

if (selectedCategory) {
setTimeout(() => {
const productsEl = document.getElementById('products');
if (productsEl) {
const headerOffset = 85; 
const elementPosition = productsEl.getBoundingClientRect().top;
const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
}
}, 80); 
}
}

// Нова функція фільтрації підкатегорії
function filterBySubcategory(sub) {
selectedSubcategory = (selectedSubcategory === sub) ? null : sub;
renderSubcategories();
applyFilterAndSort();
}

function filterProducts() { currentSearchTerm = document.getElementById('search').value.toLowerCase(); applyFilterAndSort(); }
function resetFilters() { selectedCategory = null; selectedSubcategory = null; document.getElementById('search').value = ''; currentSearchTerm = ""; renderCategories(); applyFilterAndSort(); }
function goHome() { selectedCategory = null; selectedSubcategory = null; currentSearchTerm = ""; currentSortOrder = "default"; document.getElementById('search').value = ''; renderCategories(); applyFilterAndSort(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

function updateFilterIndicator() {
const indicator = document.getElementById('filter-indicator');
const textEl = document.getElementById('filter-indicator-text');
let parts = [];
if (selectedCategory) parts.push(`Категорія: <b>${selectedCategory}</b>`);
if (selectedSubcategory) parts.push(`Підкатегорія: <b>${selectedSubcategory}</b>`);
if (currentSearchTerm) parts.push(`Пошук: "${currentSearchTerm}"`);
if (parts.length > 0) { indicator.classList.remove('hidden'); indicator.classList.add('flex'); textEl.innerHTML = parts.join(' | '); }
else { indicator.classList.add('hidden'); indicator.classList.remove('flex'); }
}

function addToCartFromList(index) {
const p = allProducts[index];
const parsedData = parseOptionsField(p.optionsField);
let defaultSize = parsedData.sizes.length > 0 ? parseSizePrice(parsedData.sizes[0], p.price).sizeName : null;
let basePrice = parsedData.sizes.length > 0 ? parseSizePrice(parsedData.sizes[0], p.price).price : p.price;
let defaultColor = parsedData.colors.length > 0 ? parsedData.colors[0] : null;

addToCart(index, 1, defaultSize, defaultColor, basePrice);
}

function showProductDetails(index) {
currentProductIndex = index;
const p = allProducts[index];
currentModalQty = 1;
document.getElementById('modal-qty').textContent = currentModalQty;

currentPhotos = p.images.length > 0 ? p.images : ['https://images.unsplash.com/photo-1594035910387-fea47794261f?w=400&q=60'];
currentPhotoIndex = 0;
updateModalPhoto();

let displayCategoryName = p.category;
if (p.subcategory) displayCategoryName += ` / ${p.subcategory}`;
document.getElementById('modal-product-category').textContent = displayCategoryName;

document.getElementById('modal-product-name').textContent = p.name;
document.getElementById('modal-product-description').textContent = p.description || 'Опис відсутній';

const sizeSelect = document.getElementById('modal-size-select');
const sizeBlock = document.getElementById('size-selector-block');
const sizeLabel = document.getElementById('modal-size-label');
const colorSelect = document.getElementById('modal-color-select');
const colorBlock = document.getElementById('color-selector-block');

const parsedData = parseOptionsField(p.optionsField);
sizeSelect.onchange = updateModalPrice;

if (parsedData.sizes.length > 0) {
sizeBlock.classList.remove('hidden');
sizeLabel.textContent = parsedData.sizeLabel; 
let sizeOptions = parsedData.sizes.map((s, idx) => {
let parsed = parseSizePrice(s, p.price);
let isSelected = idx === 0 ? 'selected' : '';
return `<option value="${parsed.sizeName}" data-price="${parsed.price}" ${isSelected}>${s}</option>`;
}).join('');
sizeSelect.innerHTML = sizeOptions;
} else {
sizeBlock.classList.add('hidden');
sizeSelect.innerHTML = '';
}

if (parsedData.colors.length > 0) {
colorBlock.classList.remove('hidden');
let colorOptions = parsedData.colors.map((c, idx) => {
let isSelected = idx === 0 ? 'selected' : '';
return `<option value="${c}" data-index="${idx}" ${isSelected}>${c}</option>`;
}).join('');
colorSelect.innerHTML = colorOptions;
} else {
colorBlock.classList.add('hidden');
colorSelect.innerHTML = '';
}

updateModalPrice();
setTimeout(() => { syncColorByPhoto(); }, 10);

document.getElementById('modal-product-btn').onclick = function() {
let chosenSize = (!sizeBlock.classList.contains('hidden')) ? sizeSelect.value : null;
let chosenColor = (!colorBlock.classList.contains('hidden')) ? colorSelect.value : null;

if (!sizeBlock.classList.contains('hidden') && !chosenSize) {
showToast("❌ Будь ласка, оберіть потрібний варіант!", "error");
return;
}
if (!colorBlock.classList.contains('hidden') && !chosenColor) {
showToast("❌ Будь ласка, оберіть колір товару!", "error");
return;
}

let activePrice = (chosenSize && sizeSelect.selectedOptions.length > 0) ? sizeSelect.selectedOptions[0].getAttribute('data-price') : p.price;
addToCart(index, currentModalQty, chosenSize, chosenColor, activePrice);
hideProductModal();
};

history.pushState({modal: "product"}, null, null);
document.getElementById('product-modal').classList.remove('hidden');
}

function updateModalPrice() {
if (currentProductIndex === null) return;
const p = allProducts[currentProductIndex];
const sizeSelect = document.getElementById('modal-size-select');
const sizeBlock = document.getElementById('size-selector-block');

let activePrice = p.price;
if (!sizeBlock.classList.contains('hidden') && sizeSelect.value && sizeSelect.selectedOptions.length > 0) {
activePrice = sizeSelect.selectedOptions[0].getAttribute('data-price');
}
let cleanNum = parseFloat(String(activePrice).replace(/\s/g, '').replace(',', '.'));
let totalPrice = cleanNum * currentModalQty;
document.getElementById('modal-product-price').textContent = totalPrice.toFixed(2).replace('.', ',') + ' грн';
}

function updateModalPhoto() {
document.getElementById('modal-product-image').src = currentPhotos[currentPhotoIndex];
const prevBtn = document.getElementById('prev-photo-btn');
const nextBtn = document.getElementById('next-photo-btn');
const counter = document.getElementById('photo-counter');

if (currentPhotos.length > 1) {
prevBtn.classList.remove('hidden'); nextBtn.classList.remove('hidden'); counter.classList.remove('hidden');
counter.textContent = `${currentPhotoIndex + 1} із ${currentPhotos.length}`;
} else {
prevBtn.classList.add('hidden'); nextBtn.classList.add('hidden'); counter.classList.add('hidden');
}
}

function syncColorByPhoto() {
const colorSelect = document.getElementById('modal-color-select');
const colorBlock = document.getElementById('color-selector-block');
if (!colorSelect || colorBlock.classList.contains('hidden') || !colorSelect.options.length) return;

let expectedSelectedIndex = currentPhotoIndex;
if (expectedSelectedIndex < colorSelect.options.length) {
colorSelect.selectedIndex = expectedSelectedIndex;
}
}

function syncPhotoByColor() {
const colorSelect = document.getElementById('modal-color-select');
if (!colorSelect || !colorSelect.options.length) return;

let selectedIdx = colorSelect.selectedIndex;
if (selectedIdx >= 0 && selectedIdx < currentPhotos.length) {
currentPhotoIndex = selectedIdx;
updateModalPhoto();
if (!document.getElementById('fullscreen-lightbox').classList.contains('hidden')) {
updateLightboxImage();
}
}
}

function changePhoto(direction) {
currentPhotoIndex += direction;
if (currentPhotoIndex < 0) currentPhotoIndex = currentPhotos.length - 1;
else if (currentPhotoIndex >= currentPhotos.length) currentPhotoIndex = 0;
updateModalPhoto();
syncColorByPhoto(); 
}

function handleSwipeGesture(onSwipeLeft, onSwipeRight) {
const threshold = 40;
if (touchStartX - touchEndX > threshold) {
onSwipeLeft(); 
} else if (touchEndX - touchStartX > threshold) {
onSwipeRight(); 
}
}

function initSwipeListeners() {
const swipeZone = document.getElementById('modal-swipe-zone');
if (swipeZone) {
swipeZone.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
swipeZone.addEventListener('touchend', e => {
touchEndX = e.changedTouches[0].screenX;
handleSwipeGesture(() => changePhoto(1), () => changePhoto(-1));
}, {passive: true});
}

const lightboxZone = document.getElementById('fullscreen-lightbox');
if (lightboxZone) {
lightboxZone.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
lightboxZone.addEventListener('touchend', e => {
touchEndX = e.changedTouches[0].screenX;
if (currentPhotos.length > 1) {
handleSwipeGesture(
() => { changePhoto(1); updateLightboxImage(); },
() => { changePhoto(-1); updateLightboxImage(); }
);
}
}, {passive: true});
}
}

function openFullscreenPhoto() {
document.getElementById('fullscreen-lightbox').classList.remove('hidden');
history.pushState({modal: "lightbox"}, null, null);
updateLightboxImage();
}

function updateLightboxImage() {
const contentArea = document.getElementById('lightbox-content-area');
const uniqueId = "pz_" + new Date().getTime();

contentArea.innerHTML = `<div id="${uniqueId}" class="pinch-zoom-container" onclick="event.stopPropagation()"><img src="${currentPhotos[currentPhotoIndex]}" class="zoomable-img rounded shadow-2xl"></div>`;

const prevLbox = document.getElementById('lightbox-prev-btn');
const nextLbox = document.getElementById('lightbox-next-btn');
if (currentPhotos.length > 1) {
prevLbox.classList.remove('hidden'); nextLbox.classList.remove('hidden');
} else {
prevLbox.classList.add('hidden'); nextLbox.classList.add('hidden');
}

setTimeout(() => {
const el = document.getElementById(uniqueId);
if (el && typeof PinchZoom !== 'undefined') {
new PinchZoom.default(el, { draggableUnzoomed: false, minZoom: 1, maxZoom: 4 });
}
}, 50);
}

function closeFullscreenPhoto() {
document.getElementById('fullscreen-lightbox').classList.add('hidden');
document.getElementById('lightbox-content-area').innerHTML = '';
updateModalPhoto();
}

function changeModalQty(amount) {
currentModalQty += amount;
if (currentModalQty < 1) currentModalQty = 1;
document.getElementById('modal-qty').textContent = currentModalQty;
updateModalPrice();
}

function hideProductModal(fromPopState = false) {
document.getElementById('product-modal').classList.add('hidden');
currentProductIndex = null;
closeFullscreenPhoto();
if (!fromPopState && window.history.state?.modal === "product") history.back();
}

function addToCart(index, qty, size = null, color = null, customPrice = null) {
const product = allProducts[index];
const finalPrice = customPrice || product.price;

const existingItem = cart.find(item => item.product.name === product.name && item.size === size && item.color === color && item.cartPrice === finalPrice);
if (existingItem) existingItem.quantity += qty;
else {
cart.push({ product: product, quantity: qty, size: size, color: color, cartPrice: finalPrice });
}
updateCartCount();
showToast(`✅ Додано в кошик!`);
}

function showCart() {
if (cart.length === 0) { showToast("🛒 Кошик порожній!", "error"); return; }
let html = '';
let total = 0;

cart.forEach((item, i) => {
const price = parseFloat(String(item.cartPrice).replace(/\s/g, '').replace(',', '.'));
total += price * item.quantity;

let metaText = '';
if (item.size) metaText += `<span class="inline-block text-xs bg-zinc-100 text-zinc-600 px-2 py-0.5 rounded mt-1 mr-1">Параметр: ${item.size}</span>`; 
if (item.color) metaText += `<span class="inline-block text-xs bg-amber-50 text-amber-700 border border-amber-200 px-2 py-0.5 rounded mt-1">Колір: ${item.color}</span>`;

const imgUrl = item.product.images.length > 0 ? item.product.images[0] : 'https://images.unsplash.com/photo-1594035910387-fea47794261f?w=80';

html += `<div class="flex gap-4 border-b pb-4 items-center justify-between notranslate">
<div class="flex gap-3 items-center flex-1">
<img src="${imgUrl}" class="w-14 h-14 object-cover rounded-xl">
<div>
<div class="text-sm font-medium text-zinc-800 leading-tight line-clamp-2">${item.product.name}</div>
<div class="flex flex-wrap">${metaText}</div>
<div class="text-zinc-800 font-bold mt-1 text-sm">${item.cartPrice} грн</div>
</div>
</div>
<div class="flex items-center gap-3">
<div class="flex items-center bg-zinc-50 rounded-lg overflow-hidden border">
<button onclick="updateCartItemQty(${i}, -1)" class="px-2 py-1 bg-zinc-100 font-bold text-sm">-</button>
<span class="px-3 font-medium text-sm">${item.quantity}</span>
<button onclick="updateCartItemQty(${i}, 1)" class="px-2 py-1 bg-zinc-100 font-bold text-sm">+</button>
</div>
<button onclick="removeFromCart(${i}); event.stopPropagation();" class="text-red-500 p-2 text-lg">🗑</button>
</div>
</div>`;
});

document.getElementById('cart-items').innerHTML = html;
document.getElementById('cart-total').textContent = total.toFixed(2).replace('.', ',') + ' грн';

history.pushState({modal: "cart"}, null, null);
document.getElementById('cart-modal').classList.remove('hidden');
}

function updateCartCount() {
const totalQty = cart.reduce((sum, item) => sum + item.quantity, 0);
document.getElementById('cart-count').textContent = totalQty;
}

function updateCartItemQty(index, delta) {
cart[index].quantity += delta;
if (cart[index].quantity <= 0) removeFromCart(index);
else { updateCartCount(); showCart(); }
}

function hideCart(fromPopState = false) {
document.getElementById('cart-modal').classList.add('hidden');
if (!fromPopState && window.history.state?.modal === "cart") history.back();
}

function removeFromCart(i) {
cart.splice(i, 1);
updateCartCount();
if (cart.length === 0) hideCart();
else showCart();
}

function showCheckoutModal() {
document.getElementById('cart-modal').classList.add('hidden');
document.getElementById('checkout-modal').classList.remove('hidden');
history.pushState({modal: "checkout"}, null, null);
}

function hideCheckoutModal(fromPopState = false) {
document.getElementById('checkout-modal').classList.add('hidden');
if (!fromPopState && window.history.state?.modal === "checkout") history.back();
}

function submitOrder() {
const nameInput = document.getElementById('customer-name').value.trim();
const phoneInput = document.getElementById('customer-phone').value.trim();

if (!nameInput || !phoneInput) {
showToast("❌ Будь ласка, заповніть обидва поля!", "error");
return;
}

const BOT_TOKEN = '8775134268:AAE9lKCPpZWs4E94uwAbMR26O2GPaJ8osDw';
const CHAT_ID = '5263239405';

let text = "🔔 НОВЕ ЗАМОВЛЕННЯ ElMarino!\n";
text += "━━━━━━━━━━━━━━━━━━━━\n\n";
text += `👤 *Покупець:* ${nameInput}\n`;
text += `📞 *Зв'язок:* ${phoneInput}\n`;
text += "━━━━━━━━━━━━━━━━━━━━\n\n";

let total = 0;
cart.forEach((item, index) => {
const price = parseFloat(String(item.cartPrice).replace(/\s/g, '').replace(',', '.'));
const itemTotal = price * item.quantity;
total += itemTotal;

let variantInfo = '';
if (item.size) variantInfo += ` (${item.size})`;
if (item.color) variantInfo += ` (колір: ${item.color})`;

text += `${index + 1}. 📦 *${item.product.name}*${variantInfo}\n`; 
text += `↳ ${item.quantity} шт. х ${item.cartPrice} грн (= ${itemTotal.toFixed(2).replace('.', ',')} грн)\n\n`;
});

text += "━━━━━━━━━━━━━━━━━━━━\n";
text += `💰 *РАЗОМ ДО ОПЛАТИ:* ${total.toFixed(2).replace('.', ',')} грн\n\n`;

fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'Markdown' })
})
.then(response => {
if (response.ok) {
cart = [];
updateCartCount();
hideCheckoutModal();
showToast("🎉 Замовлення успішно відправлено!");
}
});
}

loadProductsFromSheet();
</script>
