<script>
const SHEET_ID = '1SyxBE2iwqqt-JtEZ8N9vkdrtxUUcxtv_goVA878TMog';
const SPREADSHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

let allProducts = [];
let cart = [];
let currentModalQty = 1;
let currentPhotos = [];
let currentPhotoIndex = 0;
let currentProductIndex = null;

let selectedCategory = null;
let currentSearchTerm = "";
let currentSortOrder = "default"; 

// Перемінні для відстеження свайпів
let touchStartX = 0;
let touchEndX = 0;

function extractSizesFromDescription(description) {
if (!description) return [];
const sizeMatch = description.match(/(?:розмір|розміри|размер|размеры|модель|моделі)\s*:\s*([^\n\r.]+)/i);
if (sizeMatch && sizeMatch[1]) {
return sizeMatch[1].split(',').map(s => s.trim()).filter(Boolean);
}
return [];
}

function parseSizePrice(sizeStr, defaultPrice) {
let priceMatch = sizeStr.match(/\(([^)]+)\)/);
let sizeName = sizeStr.replace(/\s*\([^)]+\)\s*/g, '').trim();
let price = String(defaultPrice).replace(/\s/g, '').replace(',', '.');

if (priceMatch && priceMatch[1]) {
let cleanPrice = priceMatch[1].replace(/[^\d.,]/g, '').replace(',', '.').trim();
if (cleanPrice && !isNaN(parseFloat(cleanPrice))) {
price = parseFloat(cleanPrice).toFixed(2);
}
}
return { sizeName, price: parseFloat(price).toFixed(2).replace('.', ',') };
}

window.addEventListener('popstate', function () {
const modalOpen = !document.getElementById('product-modal').classList.contains('hidden');
const cartOpen = !document.getElementById('cart-modal').classList.contains('hidden');
const lightboxOpen = !document.getElementById('fullscreen-lightbox').classList.contains('hidden');
const checkoutOpen = !document.getElementById('checkout-modal').classList.contains('hidden');

if (lightboxOpen) {
closeFullscreenPhoto();
history.pushState(null, null, window.location.pathname);
} else if (checkoutOpen) {
hideCheckoutModal(true);
} else if (modalOpen) {
hideProductModal(true);
} else if (cartOpen) {
hideCart(true);
}
});

document.addEventListener('click', function(e) {
const menu = document.getElementById('sort-menu');
if (menu && !menu.classList.contains('hidden') && !e.target.closest('.relative')) {
menu.classList.add('hidden');
}
});

function showToast(message, type = 'success') {
const toast = document.createElement('div');
toast.className = 'notranslate';
const bg = type === 'success' ? '#10b981' : '#ef4444';
toast.style.cssText = `position:fixed;top:20px;left:50%;transform:translateX(-50%);background:${bg};color:white;padding:14px 24px;border-radius:20px;box-shadow:0 10px 25px -5px rgba(0,0,0,0.2);z-index:100;font-weight:600;text-align:center;max-width:90%;font-size:14px;transition:all 0.3s ease;`;
toast.textContent = message;
document.body.appendChild(toast);
setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2500);
}

async function loadProductsFromSheet() {
try {
const response = await fetch(SPREADSHEET_URL);
if (!response.ok) throw new Error(`Помилка: ${response.status}`);
const csvText = await response.text();

const parseCSV = (text) => {
let p = '', r = [];
let q = false;
let row = [''];
for (let i=0; i<text.length; i++) {
let c = text[i];
if (c === '"') { q = !q; continue; }
if (c === ',' && !q) { row.push(''); continue; }
if ((c === '\n' || c === '\r') && !q) {
if (c === '\n' && text[i-1] === '\r') continue;
r.push(row); row = ['']; continue;
}
row[row.length-1] += c;
}
if (row.length > 1 || row[0] !== '') r.push(row);
return r;
};

let rows = parseCSV(csvText);
allProducts = [];

for (let i = 1; i < rows.length; i++) {
const row = rows[i];
if (row && row[0] && row[0].trim() !== '') {
let imagesArray = [];
if (row[4]) {
imagesArray = row[4].split(',').map(url => url.trim()).filter(Boolean);
}
let safePrice = row[2] ? row[2].trim() : '0,00';
allProducts.push({
name: row[0].trim(),
category: row[1] ? row[1].trim() : 'Інше',
price: safePrice,
description: row[3] ? row[3].trim() : '',
images: imagesArray
});
}
}

renderCategories();
applyFilterAndSort();
} catch (error) {
console.error(error);
}
}

const cats = [];
allProducts.forEach(p => {
if (p.category && !cats.includes(p.category)) cats.push(p.category);
});
let html = '';
cats.forEach(cat => {
const activeStyle = (cat === selectedCategory) ? 'border-zinc-800 bg-zinc-800 font-bold text-white scale-
