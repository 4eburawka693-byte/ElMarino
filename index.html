<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElMarino Магазин</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .clamp-desc {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-24">

    <header class="bg-purple-700 text-white sticky top-0 z-40 shadow-md">
        <div class="max-w-md mx-auto px-4 py-3 flex items-center justify-between">
            <h1 class="text-xl font-black tracking-tight flex items-center gap-2">
                🛍️ ElMarino Магазин
            </h1>
            <button onclick="toggleCart(true)" class="bg-white text-purple-700 font-bold px-4 py-2 rounded-full text-sm flex items-center gap-2 shadow relative active:scale-95 transition-transform">
                🛒 <span id="cart-count">0</span>
            </button>
        </div>
        <div class="bg-purple-800 border-t border-purple-600/30">
            <div id="categories" class="max-w-md mx-auto px-4 py-2.5 flex gap-2 overflow-x-auto no-scrollbar scroll-smooth">
                </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-4">
        <div class="relative mb-4">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">🔍</span>
            <input type="text" id="search" oninput="handleSearch()" placeholder="Пошук товарів..." class="w-full pl-9 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent shadow-sm">
        </div>

        <div id="products" class="grid grid-cols-2 gap-3">
            </div>
    </main>

    <div id="product-modal" class="fixed inset-0 bg-black/60 z-50 hidden backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl overflow-hidden max-h-[90vh] flex flex-col animate-slide-up shadow-2xl">
            <div class="relative bg-gray-50 flex items-center justify-center h-72 border-b">
                <button onclick="closeProductModal()" class="absolute top-4 right-4 bg-white/80 hover:bg-white text-gray-700 w-9 h-9 rounded-full flex items-center justify-center shadow backdrop-blur-sm z-10 text-lg font-bold">✕</button>
                <img id="modal-img" src="" class="max-w-full max-h-full object-contain p-4">
            </div>
            <div class="p-5 overflow-y-auto flex-1">
                <h2 id="modal-name" class="text-lg font-black text-gray-800 leading-snug"></h2>
                <p id="modal-price" class="text-purple-700 font-black text-xl mt-1"></p>
                <p id="modal-desc" class="text-gray-600 text-sm mt-3 whitespace-pre-line bg-gray-50 p-3 rounded-xl border border-gray-100"></p>
                
                <div class="mt-6 pt-5 border-t border-gray-100">
                    <div class="flex items-center justify-between mb-3">
                        <h4 class="font-bold text-gray-800 flex items-center gap-1.5">💬 Відгуки покупців</h4>
                        <button onclick="openReviewForm()" class="text-xs bg-purple-50 text-purple-700 font-semibold px-2.5 py-1.5 rounded-lg active:bg-purple-100">Залишити відгук</button>
                    </div>
                    <div id="modal-reviews-list" class="space-y-2.5 max-h-48 overflow-y-auto pr-1 text-xs">
                        </div>
                </div>
            </div>
            <div class="p-4 bg-gray-50 border-t flex gap-3">
                <button id="modal-action-btn" class="flex-1 bg-purple-700 active:bg-purple-800 text-white py-3.5 rounded-xl text-sm font-bold shadow-md shadow-purple-200">В кошик</button>
            </div>
        </div>
    </div>

    <div id="review-form-modal" class="fixed inset-0 bg-black/60 z-55 hidden backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl p-5 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-gray-800 text-base">Ваш відгук про товар</h3>
                <button onclick="closeReviewForm()" class="text-gray-400 text-lg">✕</button>
            </div>
            <input type="hidden" id="review-product-name">
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Ваше ім'я</label>
                    <input type="text" id="review-author" placeholder="Іван" class="w-full px-3 py-2 border rounded-xl text-sm focus:outline-purple-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Текст відгуку</label>
                    <textarea id="review-text" rows="3" placeholder="Все супер, пакети міцні!" class="w-full px-3 py-2 border rounded-xl text-sm focus:outline-purple-500"></index-textarea>
                </div>
                <button onclick="submitReview()" class="w-full bg-purple-700 text-white py-2.5 rounded-xl font-bold text-sm mt-2">Надіслати відгук</button>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/60 z-50 hidden backdrop-blur-sm flex justify-end">
        <div class="bg-white w-full max-w-md h-full flex flex-col shadow-2xl animate-slide-left">
            <div class="p-4 border-b flex justify-between items-center bg-purple-700 text-white">
                <h2 class="text-lg font-black">🛒 Ваше замовлення</h2>
                <button onclick="toggleCart(false)" class="text-white text-xl font-bold p-1">✕</button>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-3">
                </div>
            <div class="p-4 border-t bg-gray-50 space-y-3">
                <div class="flex justify-between font-black text-lg text-gray-800">
                    <span>Разом:</span>
                    <span id="cart-total">0 грн</span>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">Ваше ім'я та прізвище</label>
                    <input type="text" id="order-name" placeholder="Іван Іванов" class="w-full px-4 py-2.5 bg-white border rounded-xl text-sm focus:outline-purple-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">Номер телефону</label>
                    <input type="tel" id="order-phone" placeholder="+380" class="w-full px-4 py-2.5 bg-white border rounded-xl text-sm focus:outline-purple-500">
                </div>
                <button onclick="sendOrder()" class="w-full bg-purple-700 active:bg-purple-800 text-white py-3.5 rounded-xl font-bold text-sm shadow-lg shadow-purple-100 mt-2">Оформити замовлення в Telegram</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-5 left-1/2 -translate-x-1/2 bg-gray-900 text-white text-xs px-4 py-2.5 rounded-full shadow-lg z-50 opacity-0 pointer-events-none transition-all duration-300 transform translate-y-2"></div>

    <script>
        // ТВОЇ НАЛАШТУВАННЯ
        const WEB_APP_URL = 'ПОСИЛАННЯ_НА_ТВІЙ_APPS_SCRIPT'; 
        const TELEGRAM_BOT_TOKEN = 'ТОКЕН_ТВОГО_БОТА';
        const TELEGRAM_CHAT_ID = 'ТВІЙ_ЧАТ_ІД';

        let allProducts = [];
        let categories = ['Всі'];
        let activeCategory = 'Всі';
        let cart = [];
        let globalReviews = []; // Сюди завантажуються відгуки

        // Запуск додатку
        window.addEventListener('DOMContentLoaded', () => {
            loadData();
            loadCartFromStorage();
        });

        // Завантаження даних (Товари + Відгуки одним махом)
        async function loadData() {
            try {
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();
                
                // Якщо скрипт повернув об'єкт з двома масивами
                if(data.products && data.reviews) {
                    allProducts = data.products;
                    globalReviews = data.reviews;
                } else if(Array.isArray(data)) {
                    allProducts = data;
                }

                // Витягуємо категорії
                allProducts.forEach(p => {
                    if (p.category && !categories.includes(p.category)) {
                        categories.push(p.category);
                    }
                });

                renderCategories();
                filterAndRender();
            } catch (error) {
                console.error("Помилка завантаження даних:", error);
                showToast("❌ Помилка зв'язку з базою даних");
            }
        }

        function renderCategories() {
            const container = document.getElementById('categories');
            container.innerHTML = categories.map(cat => `
                <button onclick="setCategory('${cat}')" class="px-4 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition-all ${
                    activeCategory === cat 
                    ? 'bg-white text-purple-700 shadow-sm font-bold' 
                    : 'bg-purple-600/50 text-purple-100 hover:bg-purple-600'
                }">${cat}</button>
            `).join('');
        }

        function setCategory(cat) {
            activeCategory = cat;
            renderCategories();
            filterAndRender();
        }

        function handleSearch() {
            filterAndRender();
        }

        function filterAndRender() {
            const query = document.getElementById('search').value.toLowerCase().trim();
            let filtered = allProducts;

            if (activeCategory !== 'Всі') {
                filtered = filtered.filter(p => p.category === activeCategory);
            }
            if (query) {
                filtered = filtered.filter(p => p.name.toLowerCase().includes(query) || p.description.toLowerCase().includes(query));
            }

            renderProducts(filtered);
        }

        // ВІДРЕНДЕРИТИ ТОВАРИ НА ВІТРИНІ (ЧИСТІ ФОТО БЕЗ КНОПКИ ВІДГУКІВ)
        function renderProducts(products) {
            let html = '';
            products.forEach((p) => {
                const realIndex = allProducts.findIndex(item => item.name === p.name);
                const mainImage = p.images.length > 0 ? p.images[0] : 'https://images.unsplash.com/photo-1594035910387-fea47794261f?w=300&q=60';

                html += `
                <div onclick="showProductDetails(${realIndex})" class="product-card bg-white rounded-3xl overflow-hidden shadow-sm border flex flex-col justify-between cursor-pointer">
                    <div>
                        <div class="w-full h-40 bg-gray-50 flex items-center justify-center overflow-hidden relative">
                            <img src="${mainImage}" class="max-w-full max-h-full object-contain">
                        </div>
                        <div class="p-3">
                            <h3 class="text-sm font-bold text-gray-800 leading-tight line-clamp-2 min-h-[40px]">${p.name}</h3>
                            <p class="text-gray-500 text-xs mt-1 min-h-[32px] clamp-desc">${p.description}</p>
                        </div>
                    </div>
                    <div class="p-3 pt-0">
                        <p class="text-purple-700 font-black text-base">${p.price} грн</p>
                        <button onclick="addToCartFromList(${realIndex}); event.stopPropagation();" class="mt-2 w-full bg-purple-700 active:bg-purple-800 text-white py-2.5 rounded-xl text-sm font-medium transition-colors">В кошик</button>
                    </div>
                </div>`;
            });
            document.getElementById('products').innerHTML = html || '<p class="col-span-2 text-center py-10 text-gray-500">Нічого не знайдено</p>';
        }

        // МОДАЛКА ДЕТАЛЕЙ ТОВАРУ ТА ВІДГУКІВ
        function showProductDetails(index) {
            const p = allProducts[index];
            const mainImage = p.images.length > 0 ? p.images[0] : 'https://images.unsplash.com/photo-1594035910387-fea47794261f?w=300&q=60';

            document.getElementById('modal-img').src = mainImage;
            document.getElementById('modal-name').innerText = p.name;
            document.getElementById('modal-price').innerText = `${p.price} грн`;
            document.getElementById('modal-desc').innerText = p.description || 'Опис відсутній.';
            
            document.getElementById('review-product-name').value = p.name;

            // Відображаємо тільки відгуки по цьому конкретному товару
            renderProductReviews(p.name);

            const btn = document.getElementById('modal-action-btn');
            btn.onclick = () => {
                addToCart(index);
                closeProductModal();
            };

            document.getElementById('product-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeProductModal() {
            document.getElementById('product-modal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        // ФІЛЬТРАЦІЯ ТА ВИВЕДЕННЯ ВІДГУКІВ ТОВАРУ
        function renderProductReviews(productName) {
            const container = document.getElementById('modal-reviews-list');
            const productReviews = globalReviews.filter(r => r.productName === productName);

            if(productReviews.length === 0) {
                container.innerHTML = `<p class="text-gray-400 italic">Тут ще немає відгуків. Будьте першим!</p>`;
                return;
            }

            container.innerHTML = productReviews.map(r => `
                <div class="bg-gray-50 p-2.5 rounded-xl border border-gray-100">
                    <div class="flex justify-between items-center mb-1 text-[10px] text-gray-400">
                        <span class="font-bold text-gray-700 text-xs">${r.author}</span>
                        <span>${r.date || ''}</span>
                    </div>
                    <p class="text-gray-600 text-xs leading-relaxed">${r.text}</p>
                </div>
            `).join('');
        }

        // КЕРУВАННЯ ВІКНОМ НАПИСАННЯ ВІДГУКУ
        function openReviewForm() {
            document.getElementById('review-form-modal').classList.remove('hidden');
        }

        function closeReviewForm() {
            document.getElementById('review-form-modal').classList.add('hidden');
            document.getElementById('review-author').value = '';
            document.getElementById('review-text').value = '';
        }

        // НАДСИЛАННЯ ВІДГУКУ В GOOGLE APPS SCRIPT
        async function submitReview() {
            const productName = document.getElementById('review-product-name').value;
            const author = document.getElementById('review-author').value.trim();
            const text = document.getElementById('review-text').value.trim();

            if(!author || !text) {
                showToast("⚠️ Заповніть своє ім'я та текст відгуку!");
                return;
            }

            showToast("⌛ Надсилання відгуку...");

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Важливо для уникнення CORS помилок
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productName, author, text })
                });

                // Оскільки режим 'no-cors' не повертає статус, ми додаємо відгук локально для миттєвості
                const localDate = new Date().toLocaleDateString('uk-UA');
                globalReviews.unshift({ productName, author, text, date: localDate });
                
                // Оновлюємо список відгуків на екрані
                renderProductReviews(productName);
                
                showToast("✅ Відгук успішно збережено!");
                closeReviewForm();
            } catch (error) {
                console.error(error);
                showToast("❌ Не вдалося надіслати відгук");
            }
        }

        // КОШИК ТА ОПЕРАЦІЇ
        function addToCartFromList(index) {
            addToCart(index);
        }

        function addToCart(index) {
            const product = allProducts[index];
            const existing = cart.find(item => item.name === product.name);

            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            saveCart();
            updateCartUI();
            showToast(`🛒 ${product.name} додано в кошик`);
        }

        function updateCartUI() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').innerText = count;

            const itemsContainer = document.getElementById('cart-items');
            let total = 0;

            if (cart.length === 0) {
                itemsContainer.innerHTML = '<div class="text-center py-10 text-gray-400">Кошик порожній 🥣</div>';
            } else {
                itemsContainer.innerHTML = cart.map((item, idx) => {
                    total += item.price * item.quantity;
                    return `
                    <div class="flex items-center justify-between bg-gray-50 p-3 rounded-2xl border">
                        <div class="flex-1 pr-2">
                            <h4 class="text-sm font-bold text-gray-800 line-clamp-1">${item.name}</h4>
                            <p class="text-xs text-purple-700 font-bold mt-0.5">${item.price} грн / шт</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="changeQty(${idx}, -1)" class="w-7 h-7 bg-white border font-bold text-sm rounded-lg flex items-center justify-center active:bg-gray-100">-</button>
                            <span class="text-sm font-bold w-5 text-center">${item.quantity}</span>
                            <button onclick="changeQty(${idx}, 1)" class="w-7 h-7 bg-white border font-bold text-sm rounded-lg flex items-center justify-center active:bg-gray-100">+</button>
                        </div>
                    </div>`;
                }).join('');
            }

            document.getElementById('cart-total').innerText = `${total} грн`;
        }

        function changeQty(idx, delta) {
            cart[idx].quantity += delta;
            if (cart[idx].quantity <= 0) {
                cart.splice(idx, 1);
            }
            saveCart();
            updateCartUI();
        }

        function toggleCart(show) {
            const modal = document.getElementById('cart-modal');
            if (show) modal.classList.remove('hidden');
            else modal.classList.add('hidden');
        }

        function saveCart() {
            localStorage.setItem('elmarino_cart', JSON.stringify(cart));
        }

        function loadCartFromStorage() {
            const stored = localStorage.getItem('elmarino_cart');
            if (stored) {
                try { cart = JSON.parse(stored); } catch(e) { cart = []; }
                updateCartUI();
            }
        }

        // НАДСИЛАННЯ ЗАМОВЛЕННЯ В TELEGRAM БОТ
        async function sendOrder() {
            const name = document.getElementById('order-name').value.trim();
            const phone = document.getElementById('order-phone').value.trim();

            if (cart.length === 0) {
                showToast("⚠️ Кошик порожній!");
                return;
            }
            if (!name || !phone) {
                showToast("⚠️ Введіть ім'я та телефон!");
                return;
            }

            let text = `📦 *Нове замовлення від ElMarino*\n\n`;
            text += `👤 *Покупець:* ${name}\n`;
            text += `📞 *Телефон:* ${phone}\n\n`;
            text += `🛒 *Товари:*\n`;

            let total = 0;
            cart.forEach((item, i) => {
                const sum = item.price * item.quantity;
                total += sum;
                text += `${i + 1}. ${item.name} — ${item.quantity} шт. х ${item.price} грн (${sum} грн)\n`;
            });

            text += `\n💰 *Загальна сума:* ${total} грн`;

            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: text,
                        parse_mode: 'Markdown'
                    })
                });

                if (res.ok) {
                    showToast("🎉 Замовлення надіслано в Telegram!");
                    cart = [];
                    saveCart();
                    updateCartUI();
                    toggleCart(false);
                    document.getElementById('order-name').value = '';
                    document.getElementById('order-phone').value = '';
                } else {
                    showToast("❌ Помилка надсилання боту");
                }
            } catch (err) {
                showToast("❌ Помилка інтернет-з'єднання");
            }
        }

        // Спливаючі тости (сповіщення)
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-2');
            setTimeout(() => {
                t.classList.add('opacity-0', 'pointer-events-none', 'translate-y-2');
            }, 3000);
        }
    </script>
</body>
</html>
