<!DOCTYPE html>
<html lang="uk" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЕльМарино</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pinch-zoom-js@2.3.4/dist/pinch-zoom.umd.min.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(err => console.error('SW Error', err));
        });
      }
    </script>
    <style>
        body { font-family: system-ui, sans-serif; }
        .product-card { transition: all 0.2s ease; }
        .product-card:active { transform: scale(0.98); }
        .clamp-desc { display: -webkit-box !important; -webkit-line-clamp: 2 !important; -webkit-box-orient: vertical !important; overflow: hidden !important; text-overflow: ellipsis !important; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="max-w-4xl mx-auto pb-20">
        <div class="w-full overflow-hidden shadow-md">
            <img src="https://i.postimg.cc/KvynpRrT/1782584017691.jpg" alt="Banner" class="w-full h-auto">
        </div>
        <header class="bg-purple-700 text-white p-4 sticky top-0 z-40 shadow">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold">🛍️ ЕльМарино</h1>
                <button onclick="showCart()" class="bg-white text-purple-700 px-5 py-2 rounded-2xl shadow font-medium relative">🛒 Кошик <span id="cart-count" class="bg-red-500 text-white text-xs rounded-full px-2 py-0.5 absolute -top-2 -right-2 hidden">0</span></button>
            </div>
        </header>
        <div class="p-4 flex gap-2">
            <input id="search-input" type="text" placeholder="🔍 Пошук..." class="w-full p-4 rounded-2xl border outline-none shadow-sm" onkeyup="filterProducts()">
            <button onclick="resetFilters()" class="bg-gray-200 px-4 rounded-2xl text-sm">Всі</button>
        </div>
        <div id="loading-status" class="text-center py-10 text-gray-500 font-medium">⏳ Завантаження товарів...</div>
        <div id="categories" class="p-4 mb-2 grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
        <div id="products" class="px-4 grid grid-cols-2 gap-4"></div>
    </div>

    <!-- Модальні вікна -->
    <div id="product-modal" class="hidden fixed inset-0 bg-black/70 z-50 p-3 flex items-center justify-center">
        <div class="bg-white w-full max-w-md rounded-3xl overflow-hidden shadow-2xl relative max-h-[85vh] flex flex-col">
            <button onclick="document.getElementById('product-modal').classList.add('hidden')" class="absolute top-4 right-4 bg-black/60 text-white w-9 h-9 rounded-full z-50">&times;</button>
            <div class="overflow-y-auto p-0 flex-1 pb-24">
                <img id="modal-product-image" src="" class="w-full h-64 object-contain bg-gray-50">
                <div class="p-5">
                    <h2 id="modal-product-name" class="text-xl font-bold mb-2"></h2>
                    <p id="modal-product-price" class="text-2xl font-black text-purple-700"></p>
                    <p id="modal-product-desc" class="text-gray-600 mt-2 whitespace-pre-line"></p>
                </div>
            </div>
            <div class="absolute bottom-0 w-full p-4 bg-white border-t flex gap-3">
                <button onclick="addModalToCart()" class="flex-1 bg-purple-700 text-white py-4 rounded-2xl font-bold">Додати в кошик</button>
            </div>
        </div>
    </div>

    <script>
        // ВАШ ID ТАБЛИЦІ
        const SHEET_ID = '1X58m63-6G-b8wO21kXv79M4o7G6zV974P3WJ45H7y9o'; 
        const SCRIPT_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Products`;

        let allProducts = [];
        let cart = JSON.parse(localStorage.getItem('elmarino_cart')) || [];

        async function loadProducts() {
            try {
                const response = await fetch(SCRIPT_URL);
                const text = await response.text();
                const data = JSON.parse(text.substring(47, text.length - 2));
                allProducts = data.table.rows.map(row => ({
                    id: row.c[0]?.v, name: row.c[1]?.v, category: row.c[2]?.v, 
                    images: (row.c[3]?.v || '').split(','), price: row.c[4]?.v, 
                    unit: row.c[5]?.v, desc: row.c[6]?.v
                })).filter(p => p.id);
                document.getElementById('loading-status').classList.add('hidden');
                renderProducts(allProducts);
            } catch(e) { document.getElementById('loading-status').innerText = '❌ Помилка завантаження'; }
        }

        function renderProducts(list) {
            document.getElementById('products').innerHTML = list.map(p => `
                <div class="bg-white rounded-3xl p-3 shadow-sm border" onclick="showProductModal(${p.id})">
                    <img src="${p.images[0]}" class="w-full h-36 object-contain mb-2">
                    <h3 class="font-bold text-sm clamp-desc">${p.name}</h3>
                    <p class="text-purple-700 font-black">${p.price} грн</p>
                </div>
            `).join('');
        }

        function showProductModal(id) {
            const p = allProducts.find(x => x.id == id);
            document.getElementById('modal-product-name').innerText = p.name;
            document.getElementById('modal-product-image').src = p.images[0];
            document.getElementById('modal-product-price').innerText = p.price + ' грн';
            document.getElementById('modal-product-desc').innerText = p.desc;
            document.getElementById('product-modal').classList.remove('hidden');
        }

        function addModalToCart() { alert('Додано!'); }
        function filterProducts() { /* Логіка пошуку */ }
        function showCart() { alert('Кошик'); }
        function resetFilters() { renderProducts(allProducts); }

        window.onload = loadProducts;
    </script>
</body>
</html>
