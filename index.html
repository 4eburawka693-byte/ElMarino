<script>
const SHEET_ID = '1SyxBE2iwqqt-JtEZ8N9vkdrtxUUcxtv_goVA878TMog';
const SPREADSHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

let allProducts = [];
let cart = [];
let currentModalQty = 1;
let currentPhotos = [];
let currentPhotoIndex = 0;
let currentProductIndex = null;

let selectedCategory = null;
let currentSearchTerm = "";
let currentSortOrder = "default"; 

function extractSizesFromDescription(description) {
if (!description) return [];
const sizeMatch = description.match(/(?:розмір|розміри|размер|размеры|модель|моделі)\s*:\s*([^\n\r.]+)/i);
if (sizeMatch && sizeMatch[1]) {
return sizeMatch[1].split(',').map(s => s.trim()).filter(Boolean);
}
return [];
}

function parseSizePrice(sizeStr, defaultPrice) {
let priceMatch = sizeStr.match(/\(([^)]+)\)/);
let sizeName = sizeStr.replace(/\s*\([^)]+\)\s*/g, '').trim();
let price = String(defaultPrice).replace(/\s/g, '').replace(',', '.');

if (priceMatch && priceMatch[1]) {
let cleanPrice = priceMatch[1].replace(/[^\d.,]/g, '').replace(',', '.').trim();
if (cleanPrice && !isNaN(parseFloat(cleanPrice))) {
price = parseFloat(cleanPrice).toFixed(2);
}
}
return { sizeName, price: parseFloat(price).toFixed(2).replace('.', ',') };
}

window.addEventListener('popstate', function () {
const modalOpen = !document.getElementById('product-modal').classList.contains('hidden');
const cartOpen = !document.getElementById('cart-modal').classList.contains('hidden');
const lightboxOpen = !document.getElementById('fullscreen-lightbox').classList.contains('hidden');
const checkoutOpen = !document.getElementById('checkout-modal').classList.contains('hidden');

if (lightboxOpen) {
closeFullscreenPhoto();
history.pushState(null, null, window.location.pathname);
} else if (checkoutOpen) {
hideCheckoutModal(true);
} else if (modalOpen) {
hideProductModal(true);
} else if (cartOpen) {
hideCart(true);
}
});

document.addEventListener('click', function(e) {
const menu = document.getElementById('sort-menu');
if (menu && !menu.classList.contains('hidden') && !e.target.closest('.relative')) {
menu.classList.add('hidden');
}
});

function showToast(message, type = 'success') {
const toast = document.createElement('div');
toast.className = 'notranslate';
const bg = type === 'success' ? '#10b981' : '#ef4444';
toast.style.cssText = `position:fixed;top:20px;left:50%;transform:translateX(-50%);background:${bg};color:white;padding:14px 24px;border-radius:20px;box-shadow:0 10px 25px -5px rgba(0,0,0,0.2);z-index:100;font-weight:600;text-align:center;max-width:90%;font-size:14px;transition:all 0.3s ease;`;
toast.textContent = message;
document.body.appendChild(toast);
setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2500);
}

async function loadProductsFromSheet() {
try {
const response = await fetch(SPREADSHEET_URL);
const csvText = await response.text();

const parseCSV = (text) => {
let p = '', r = [];
let q = false;
let row = [''];
for (let i=0; i<text.length; i++) {
let c = text[i];
if (c === '"') { q = !q; continue; }
if (c === ',' && !q) { row.push(''); continue; }
if ((c === '\n' || c === '\r') && !q) {
if (c === '\n' && text[i-1] === '\r') continue;
r.push(row); row = ['']; continue;
}
row[row.length-1] += c;
}
if (row.length > 1 || row[0] !== '') r.push(row);
return r;
};

const rows = parseCSV(csvText);
allProducts = [];

for (let i = 1; i < rows.length; i++) {
const row = rows[i];
if (row && row[0] && row[0].trim() !== '') {
try {
let imagesArray = [];
if (row[4]) {
imagesArray = row[4].split(',').map(url => url.trim()).filter(Boolean);
}

let safePrice = row[2] ? row[2].trim() : '0,00';
if(!safePrice || safePrice === '') safePrice = '0,00';

allProducts.push({
name: row[0].trim(),
category: row[1] ? row[1].trim() : 'Інше',
price: safePrice,
description: row[3] ? row[3].trim() : '',
images: imagesArray
});
} catch (rowError) {
console.error("Помилка обробки рядка таблиці:", rowError);
}
}
}

renderCategories();
applyFilterAndSort();
} catch (error) {
console.error(error);
}
}

function renderCategories() {
const cats = [];
allProducts.forEach(p => {
if (p.category && !cats.includes(p.category)) {
cats.push(p.category);
}
});

let html = '';
cats.forEach(cat => {
const activeStyle = (cat === selectedCategory) ? 'border-zinc-800 bg-zinc-800 font-bold text-white scale-[1.02]' : 'bg-white text-zinc-700';
html += `<div onclick="filterByCategory('${cat}')" class="${activeStyle} p-3 rounded-2xl shadow-sm text-center text-xs font-semibold cursor-pointer active:opacity-90 border hover:border-zinc-400 transition-all">${cat}</div>`;
});
document.getElementById('categories').innerHTML = html;
}

function applyFilterAndSort() {
let filtered = [...allProducts];

if (selectedCategory) {
filtered = filtered.filter(p => p.category === selectedCategory);
}

if (currentSearchTerm) {
filtered = filtered.filter(p =>
p.name.toLowerCase().includes(currentSearchTerm) || 
(p.description && p.description.toLowerCase().includes(currentSearchTerm))
);
}

if (currentSortOrder === 'low-to-high') {
filtered.sort((a, b) => {
const priceA = parseFloat(String(a.price).replace(/\s/g, '').replace(',', '.'));
const priceB = parseFloat(String(b.price).replace(/\s/g, '').replace(',', '.'));
return (isNaN(priceA) ? 0 : priceA) - (isNaN(priceB) ? 0 : priceB);
});
} else if (currentSortOrder === 'high-to-low') {
filtered.sort((a, b) => {
const priceA = parseFloat(String(a.price).replace(/\s/g, '').replace(',', '.'));
const priceB = parseFloat(String(b.price).replace(/\s/g, '').replace(',', '.'));
return (isNaN(priceB) ? 0 : priceB) - (isNaN(priceA) ? 0 : priceA);
});
}

updateFilterIndicator();
renderProducts(filtered);
}

function renderProducts(products) {
let html = '';
products.forEach((p) => {
const realIndex = allProducts.findIndex(item => item.name === p.name);
const mainImage = p.images.length > 0 ? p.images[0] : 'https://images.unsplash.com/photo-1594035910387-fea47794261f?w=300&q=60';

html += `<div onclick="showProductDetails(${realIndex})" class="product-card bg-white rounded-3xl overflow-hidden shadow-sm border flex flex-col justify-between">
<div>
<div class="w-full h-40 bg-zinc-50 flex items-center justify-center overflow-hidden">
<img src="${mainImage}" class="max-w-full max-h-full object-contain">
</div>
<div class="p-3">
<h3 class="text-sm font-bold text-zinc-800 leading-tight line-clamp-2 min-h-[40px]">${p.name}</h3>
<p class="text-zinc-500 text-xs mt-1 min-h-[32px] clamp-desc">${p.description}</p>
</div>
</div>
<div class="p-3 pt-0">
<p class="text-zinc-800 font-black text-base">${p.price} грн</p>
<button onclick="addToCartFromList(${realIndex}); event.stopPropagation();" class="mt-2 w-full bg-zinc-800 text-white py-2.5 rounded-xl text-sm font-bold transition-all active:bg-zinc-700">В кошик</button>
</div>
</div>`;
});
document.getElementById('products').innerHTML = html || '<p class="col-span-2 text-center py-10 text-zinc-500">Упс, товарів не знайдено</p>';
}

function toggleSortMenu() {
document.getElementById('sort-menu').classList.toggle('hidden');
}

function setSortOrder(order) {
currentSortOrder = order;
document.getElementById('sort-menu').classList.add('hidden');
applyFilterAndSort();
}

function filterByCategory(cat) {
selectedCategory = (selectedCategory === cat) ? null : cat;
applyFilterAndSort();
}

function filterProducts() {
currentSearchTerm = document.getElementById('search').value.toLowerCase();
applyFilterAndSort();
}

function resetFilters() {
selectedCategory = null;
document.getElementById('search').value = '';
currentSearchTerm = "";
applyFilterAndSort();
}

function goHome() {
selectedCategory = null;
currentSearchTerm = "";
currentSortOrder = "default";
document.getElementById('search').value = '';
applyFilterAndSort();
window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateFilterIndicator() {
const indicator = document.getElementById('filter-indicator');
const textEl = document.getElementById('filter-indicator-text');
let parts = [];

if (selectedCategory) parts.push(`Категорія: <b>${selectedCategory}</b>`);
if (currentSearchTerm) parts.push(`Пошук: "${currentSearchTerm}"`);
if (currentSortOrder === 'low-to-high') parts.push(`Ціна: <b>від дешевих 📈</b>`);
if (currentSortOrder === 'high-to-low') parts.push(`Ціна: <b>від дорогих 📉</b>`);

if (parts.length > 0) {
indicator.classList.remove('hidden');
indicator.classList.add('flex');
textEl.innerHTML = parts.join(' | ');
} else {
indicator.classList.add('hidden');
indicator.classList.remove('flex');
}
}

function addToCartFromList(index) {
const p = allProducts[index];
const catLower = p.category.toLowerCase().trim();
const parsedSizes = extractSizesFromDescription(p.description);

let defaultSize = null;
let basePrice = p.price;

if (parsedSizes.length > 0) {
let parsed = parseSizePrice(parsedSizes[0], p.price);
defaultSize = parsed.sizeName;
basePrice = parsed.price;
} else if (catLower === 'взуття') {
defaultSize = '36';
}

const colorMatch = p.description.match(/(?:колір|кольори|цвет|цвета)\s*:\s*([^\n\r.]+)/i);
let defaultColor = null;
if (colorMatch && colorMatch[1]) {
let colors = colorMatch[1].split(',').map(c => c.trim()).filter(Boolean);
if (colors.length > 0) defaultColor = colors[0];
}

addToCart(index, 1, defaultSize, defaultColor, basePrice);
}

function showProductDetails(index) {
currentProductIndex = index;
const p = allProducts[index];
currentModalQty = 1;
document.getElementById('modal-qty').textContent = currentModalQty;

currentPhotos = p.images.length > 0 ? p.images : ['https://images.unsplash.com/photo-1594035910387-fea47794261f?w=400&q=60'];
currentPhotoIndex = 0;
updateModalPhoto();

document.getElementById('modal-product-category').textContent = p.category;
document.getElementById('modal-product-name').textContent = p.name;
document.getElementById('modal-product-description').textContent = p.description || 'Опис відсутній';

const sizeSelect = document.getElementById('modal-size-select');
const sizeBlock = document.getElementById('size-selector-block');
const colorSelect = document.getElementById('modal-color-select');
const colorBlock = document.getElementById('color-selector-block');

const catLower = p.category.toLowerCase().trim();
const parsedSizes = extractSizesFromDescription(p.description);

sizeSelect.onchange = updateModalPrice;
sizeSelect.oninput = updateModalPrice;

if (parsedSizes.length > 0) {
sizeBlock.classList.remove('hidden');
sizeSelect.innerHTML = parsedSizes.map(s => {
let parsed = parseSizePrice(s, p.price);
return `<option value="${parsed.sizeName}" data-price="${parsed.price}">${s}</option>`;
}).join('');
} else if (catLower === 'взуття') {
sizeBlock.classList.remove('hidden');
let defaultSizes = ['36', '37', '38', '39', '40', '41'];
sizeSelect.innerHTML = defaultSizes.map(s => `<option value="${s}" data-price="${p.price}">${s}</option>`).join('');
} else {
sizeBlock.classList.add('hidden');
sizeSelect.innerHTML = '';
}

const colorMatch = p.description.match(/(?:колір|кольори|цвет|цвета)\s*:\s*([^\n\r.]+)/i);
