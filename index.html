<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElMarino Магазин</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, sans-serif; }
        .product-card { transition: all 0.2s ease; cursor: pointer; }
        .product-card:active { transform: scale(0.98); }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-100">

<div class="max-w-4xl mx-auto pb-20">
    <div class="w-full overflow-hidden shadow-sm">
        <img src="https://i.postimg.cc/KvynpRrT/1782584017691.jpg" alt="ElMarino Баннер" class="w-full h-auto object-cover block">
    </div>

    <header class="bg-purple-700 text-white p-4 sticky top-0 z-50 shadow">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-bold">🛍️ ElMarino Магазин</h1>
            <button onclick="showCart()" class="flex items-center gap-2 bg-white text-purple-700 px-5 py-2 rounded-2xl font-medium">
                🛒 <span id="cart-count" class="bg-red-500 text-white text-xs rounded-full px-2 py-0.5">0</span>
            </button>
        </div>
    </header>

    <div class="p-4 flex gap-2">
        <input id="search" type="text" placeholder="🔍 Пошук товарів..." 
               class="w-full p-4 rounded-2xl border focus:border-purple-600 outline-none shadow-sm" 
               onkeyup="filterProducts()">
        <button onclick="resetFilters()" class="bg-gray-200 text-gray-700 px-4 rounded-2xl text-sm font-medium hover:bg-gray-300">Всі</button>
    </div>

    <div id="loading-status" class="text-center py-10 text-gray-500 font-medium">
        ⏳ Завантаження товарів та актуальних цін...
    </div>

    <div id="categories" class="px-4 mb-6 grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
    
    <div id="products" class="px-4 grid grid-cols-2 gap-4"></div>
</div>

<div id="product-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4" onclick="hideProductModal()">
    <div class="bg-white w-full max-w-md rounded-3xl overflow-hidden shadow-2xl relative" onclick="event.stopPropagation()">
        <button onclick="hideProductModal()" class="absolute top-4 right-4 bg-black/50 text-white w-10 h-10 rounded-full flex items-center justify-center text-xl font-bold z-10">✕</button>
        
        <div class="w-full h-72 bg-gray-50 flex items-center justify-center overflow-hidden relative">
            <img id="modal-product-image" src="" class="max-w-full max-h-full object-contain" onerror="this.src='https://via.placeholder.com/400x300?text=Фото'">
            <button id="prev-photo-btn" onclick="changePhoto(-1)" class="absolute left-3 bg-black/40 text-white w-9 h-9 rounded-full flex items-center justify-center font-bold text-lg active:bg-black/60 select-none">＜</button>
            <button id="next-photo-btn" onclick="changePhoto(1)" class="absolute right-3 bg-black/40 text-white w-9 h-9 rounded-full flex items-center justify-center font-bold text-lg active:bg-black/60 select-none">＞</button>
            <span id="photo-counter" class="absolute bottom-3 right-3 bg-black/60 text-white text-xs px-2.5 py-1 rounded-full font-medium"></span>
        </div>

        <div class="p-6">
            <span id="modal-product-category" class="text-xs font-bold uppercase tracking-wider text-purple-600 bg-purple-50 px-2.5 py-1 rounded-md"></span>
            <h2 id="modal-product-name" class="text-xl font-bold text-gray-800 mt-3 leading-tight"></h2>
            <p id="modal-product-description" class="text-gray-600 text-sm mt-2 whitespace-pre-line"></p>
            
            <div id="size-selector-block" class="hidden mt-4 flex items-center gap-3 bg-gray-50 p-2 rounded-xl justify-between">
                <span class="text-gray-600 font-medium text-sm pl-2">Оберіть розмір:</span>
                <select id="modal-size-select" class="p-2 rounded-lg border bg-white font-bold text-gray-700 outline-none focus:border-purple-600">
                    <option value="30">30</option><option value="31">31</option><option value="32">32</option><option value="33">33</option><option value="34">34</option><option value="35">35</option><option value="36">36</option><option value="37">37</option><option value="38" selected>38</option><option value="39">39</option><option value="40">40</option><option value="41">41</option><option value="42">42</option><option value="43">43</option><option value="44">44</option><option value="45">45</option><option value="46">46</option>
                </select>
            </div>

            <div id="color-selector-block" class="hidden mt-4 flex items-center gap-3 bg-gray-50 p-2 rounded-xl justify-between">
                <span class="text-gray-600 font-medium text-sm pl-2">Оберіть колір:</span>
                <select id="modal-color-select" class="p-2 rounded-lg border bg-white font-bold text-gray-700 outline-none focus:border-purple-600 min-w-[120px]"></select>
            </div>
            
            <div class="mt-4 flex items-center gap-3 bg-gray-50 p-2 rounded-xl justify-between">
                <span class="text-gray-600 font-medium text-sm pl-2">Кількість:</span>
                <div class="flex items-center gap-1">
                    <button onclick="changeModalQty(-1)" class="w-10 h-10 bg-white rounded-lg border font-bold text-xl active:bg-gray-100 shadow-sm">-</button>
                    <span id="modal-qty" class="w-12 text-center font-bold text-lg">1</span>
                    <button onclick="changeModalQty(1)" class="w-10 h-10 bg-white rounded-lg border font-bold text-xl active:bg-gray-100 shadow-sm">+</button>
                </div>
            </div>

            <div class="mt-6 flex items-center justify-between gap-4 border-t pt-4">
                <div>
                    <span class="text-gray-400 text-xs block">Ціна</span>
                    <span id="modal-product-price" class="text-2xl font-black text-purple-700"></span>
                </div>
                <button id="modal-product-btn" class="flex-1 bg-purple-700 hover:bg-purple-800 text-white py-4 rounded-2xl font-semibold transition-colors shadow-lg shadow-purple-700/20">
                    Додати в кошик
                </button>
            </div>
        </div>
    </div>
</div>

<div id="cart-modal" class="hidden fixed inset-0 bg-black/70 flex items-end z-50">
    <div class="bg-white w-full rounded-t-3xl max-h-[85vh] overflow-auto p-5">
        <div class="flex justify-between mb-6">
            <h2 class="text-2xl font-bold">Кошик</h2>
            <button onclick="hideCart()" class="text-3xl">✕</button>
        </div>
        <div id="cart-items" class="space-y-4"></div>
        <div class="mt-8 border-t pt-6">
            <div class="flex justify-between text-xl font-bold">
                <span>Разом:</span>
                <span id="cart-total">0 грн</span>
            </div>
            <button onclick="placeOrder()" class="mt-6 w-full bg-green-600 text-white py-5 rounded-3xl text-lg font-medium">
                Оформити замовлення (Telegram)
            </button>
        </div>
    </div>
</div>

<script>
const SHEET_ID = '1SyxBE2iwqqt-JtEZ8N9vkdrtxUUcxtv_goVA878TMog';
const SPREADSHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

let allProducts = [];
let cart = [];
let currentModalQty = 1;

let currentPhotos = [];
let currentPhotoIndex = 0;

async function loadProductsFromSheet() {
    try {
        const response = await fetch(SPREADSHEET_URL);
        const csvText = await response.text();
        
        const lines = csvText.split('\n').map(line => {
            return line.split('","').map(cell => cell.replace(/^"|"$/g, '').trim());
        });

        allProducts = [];
        
        for (let i = 1; i < lines.length; i++) {
            const row = lines[i];
            if (row && row[0]) { 
                let imagesArray = [];
                if (row[4]) {
                    imagesArray = row[4].split(',').map(url => url.trim()).filter(Boolean);
                }

                allProducts.push({
                    name: row[0],
                    category: row[1] || 'Інше',
                    price: row[2] || '0,00',
                    description: row[3] || '',
                    images: imagesArray
                });
            }
        }

        document.getElementById('loading-status').classList.add('hidden');
        renderCategories();
        renderProducts(allProducts);
    } catch (error) {
        console.error('Помилка завантаження:', error);
        document.getElementById('loading-status').innerHTML = '❌ Не вдалося завантажити товари.';
    }
}

function renderCategories() {
    const cats = [...new Set(allProducts.map(p => p.category))].filter(Boolean).sort();
    let html = '';
    cats.forEach(cat => {
        html += `<div onclick="filterByCategory('${cat}')" class="bg-white p-3 rounded-2xl shadow-sm text-center text-xs font-semibold cursor-pointer active:bg-purple-100 border hover:border-purple-300 transition-colors">${cat}</div>`;
    });
    document.getElementById('categories').innerHTML = html;
}

function renderProducts(products) {
    let html = '';
    products.forEach((p) => {
        const realIndex = allProducts.findIndex(item => item.name === p.name);
        const mainImage = p.images.length > 0 ? p.images[0] : 'https://via.placeholder.com/300x200?text=Фото';
        
        html += `
            <div onclick="showProductDetails(${realIndex})" class="product-card bg-white rounded-3xl overflow-hidden shadow-sm border flex flex-col justify-between">
                <div>
                    <div class="w-full h-40 bg-gray-50 flex items-center justify-center overflow-hidden">
                        <img src="${mainImage}" class="max-w-full max-h-full object-contain" onerror="this.src='https://via.placeholder.com/300x200?text=Фото'">
                    </div>
                    <div class="p-3">
                        <h3 class="font-medium text-sm line-clamp-2 text-gray-800">${p.name}</h3>
                        <p class="text-gray-500 text-xs mt-1 min-h-[16px]">${p.description || ''}</p>
                    </div>
                </div>
                <div class="p-3 pt-0">
                    <p class="text-purple-700 font-bold text-lg">${p.price} грн</p>
                    <button onclick="addToCart(${realIndex}, 1); event.stopPropagation();" 
                            class="mt-2 w-full bg-purple-700 active:bg-purple-800 text-white py-2.5 rounded-xl text-sm font-medium transition-colors">В кошик</button>
                </div>
            </div>`;
    });
    document.getElementById('products').innerHTML = html || '<p class="col-span-2 text-center py-10 text-gray-500">Нічого не знайдено</p>';
}

function showProductDetails(index) {
    const p = allProducts[index];
    currentModalQty = 1;
    document.getElementById('modal-qty').textContent = currentModalQty;
    
    currentPhotos = p.images.length > 0 ? p.images : ['https://via.placeholder.com/400x300?text=Фото'];
    currentPhotoIndex = 0;
    updateModalPhoto();

    document.getElementById('modal-product-category').textContent = p.category;
    document.getElementById('modal-product-name').textContent = p.name;
    document.getElementById('modal-product-description').textContent = p.description || 'Опис відсутній';
    document.getElementById('modal-product-price').textContent = p.price + ' грн';
    
    // Проверка категории обуви
    const sizeSelect = document.getElementById('modal-size-select');
    const sizeBlock = document.getElementById('size-selector-block');
    if (p.category.toLowerCase().includes('взуття')) {
        sizeBlock.classList.remove('hidden');
        sizeSelect.value = "38";
    } else {
        sizeBlock.classList.add('hidden');
    }

    // ИСПРАВЛЕНО: Парсинг и отображение цветов для праздничной категории
    const colorSelect = document.getElementById('modal-color-select');
    const colorBlock = document.getElementById('color-selector-block');
    
    if (p.category.toLowerCase().includes('свята')) {
        colorBlock.classList.remove('hidden');
        let colors = ['Асорті']; // значение по умолчанию
        
        // Пытаемся вытащить цвета из текста описания (например, "Кольори: Червоний, Синій" или "Цвета: ...")
        const match = p.description.match(/(?:колір|кольори|цвет|цвета)\s*:\s*([^\n\r.]+)/i);
        if (match && match[1]) {
            colors = match[1].split(',').map(c => c.trim()).filter(Boolean);
        }
        
        colorSelect.innerHTML = colors.map(c => `<option value="${c}">${c}</option>`).join('');
    } else {
        colorBlock.classList.add('hidden');
    }
    
    document.getElementById('modal-product-btn').onclick = function() {
        let chosenSize = p.category.toLowerCase().includes('взуття') ? sizeSelect.value : null;
        let chosenColor = p.category.toLowerCase().includes('свята') ? colorSelect.value : null;
        
        addToCart(index, currentModalQty, chosenSize, chosenColor);
        hideProductModal();
    };
    
    document.getElementById('product-modal').classList.remove('hidden');
}

function updateModalPhoto() {
    document.getElementById('modal-product-image').src = currentPhotos[currentPhotoIndex];
    const prevBtn = document.getElementById('prev-photo-btn');
    const nextBtn = document.getElementById('next-photo-btn');
    const counter = document.getElementById('photo-counter');
    
    if (currentPhotos.length > 1) {
        prevBtn.classList.remove('hidden'); nextBtn.classList.remove('hidden'); counter.classList.remove('hidden');
        counter.textContent = `${currentPhotoIndex + 1} із ${currentPhotos.length}`;
    } else {
        prevBtn.classList.add('hidden'); nextBtn.classList.add('hidden'); counter.classList.add('hidden');
    }
}

function changePhoto(direction) {
    currentPhotoIndex += direction;
    if (currentPhotoIndex < 0) currentPhotoIndex = currentPhotos.length - 1;
    else if (currentPhotoIndex >= currentPhotos.length) currentPhotoIndex = 0;
    updateModalPhoto();
}

function changeModalQty(amount) {
    currentModalQty += amount;
    if (currentModalQty < 1) currentModalQty = 1;
    document.getElementById('modal-qty').textContent = currentModalQty;
}

function hideProductModal() {
    document.getElementById('product-modal').classList.add('hidden');
}

function filterByCategory(cat) {
    document.getElementById('search').value = '';
    const filtered = allProducts.filter(p => p.category === cat);
    renderProducts(filtered);
}

UX-ЗАКАЗЫ:
function resetFilters() {
    document.getElementById('search').value = '';
    renderProducts(allProducts);
}

function filterProducts() {
    const term = document.getElementById('search').value.toLowerCase();
    const filtered = allProducts.filter(p => 
        p.name.toLowerCase().includes(term) || (p.description && p.description.toLowerCase().includes(term))
    );
    renderProducts(filtered);
}

function addToCart(index, qty, size = null, color = null) {
    const product = allProducts[index];
    const existingItem = cart.find(item => item.product.name === product.name && item.size === size && item.color === color);
    
    if (existingItem) {
        existingItem.quantity += qty;
    } else {
        cart.push({ product: product, quantity: qty, size: size, color: color });
    }
    
    updateCartCount();
    
    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#10b981;color:white;padding:12px 24px;border-radius:9999px;box-shadow:0 10px 15px -3px rgb(0 0 0 / 0.1);z-index:100;font-weight:500;';
    
    let infoText = '';
    if (size) infoText += ` (Розм. ${size})`;
    if (color) infoText += ` (Колір: ${color})`;
    toast.textContent = `✅ Додано: ${qty} шт.${infoText}!`;
    
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 1200);
}

function updateCartCount() {
    const totalQty = cart.reduce((sum, item) => sum + item.quantity, 0);
    document.getElementById('cart-count').textContent = totalQty;
}

function showCart() {
    if (cart.length === 0) { alert("Кошик порожній"); return; }
    let html = '';
    let total = 0;
    
    cart.forEach((item, i) => {
        const price = parseFloat(item.product.price.replace(',', '.'));
        const itemTotal = price * item.quantity;
        total += itemTotal;
        
        let metaText = '';
        if (item.size) metaText += `<span class="inline-block text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded mt-1 mr-1">Розмір: ${item.size}</span>`;
        if (item.color) metaText += `<span class="inline-block text-xs bg-purple-50 text-purple-600 px-2 py-0.5 rounded mt-1">Колір: ${item.color}</span>`;
        
        const imgUrl = item.product.images.length > 0 ? item.product.images[0] : 'https://via.placeholder.com/80';
        
        html += `
            <div class="flex gap-4 border-b pb-4 items-center justify-between">
                <div class="flex gap-3 items-center flex-1">
                    <img src="${imgUrl}" class="w-14 h-14 object-cover rounded-xl" onerror="this.src='https://via.placeholder.com/80'">
                    <div>
                        <div class="text-sm font-medium text-gray-800 line-clamp-2 leading-tight">${item.product.name}</div>
                        <div class="flex flex-wrap">${metaText}</div>
                        <div class="text-purple-700 font-bold mt-1 text-sm">${item.product.price} грн</div>
                    </div>
                </div>
                
                <div class="flex items-center gap-3">
                    <div class="flex items-center bg-gray-100 rounded-lg overflow-hidden border">
                        <button onclick="updateCartItemQty(${i}, -1)" class="w-8 h-8 font-bold hover:bg-gray-200 active:bg-gray-300">-</button>
                        <span class="w-8 text-center text-sm font-bold text-gray-700">${item.quantity}</span>
                        <button onclick="updateCartItemQty(${i}, 1)" class="w-8 h-8 font-bold hover:bg-gray-200 active:bg-gray-300">+</button>
                    </div>
                    <button onclick="removeFromCart(${i}); event.stopPropagation();" class="text-red-500 p-2 text-lg">🗑</button>
                </div>
            </div>`;
    });
    
    document.getElementById('cart-items').innerHTML = html;
    document.getElementById('cart-total').textContent = total.toFixed(2) + ' грн';
    document.getElementById('cart-modal').classList.remove('hidden');
}

function updateCartItemQty(index, delta) {
    cart[index].quantity += delta;
    if (cart[index].quantity <= 0) removeFromCart(index);
    else { updateCartCount(); showCart(); }
}

function hideCart() {
    document.getElementById('cart-modal').classList.add('hidden');
}

function removeFromCart(i) {
    cart.splice(i, 1);
    updateCartCount();
    if (cart.length === 0) hideCart();
    else showCart();
}

function placeOrder() {
    if (cart.length === 0) { alert("Кошик порожній"); return; }

    let text = "Замовлення ElMarino:\n\n";
    let total = 0;
    
    cart.forEach(item => {
        const price = parseFloat(item.product.price.replace(',', '.'));
        const itemTotal = price * item.quantity;
        total += itemTotal;
        
        let variantInfo = '';
        if (item.size) variantInfo += ` (розм. ${item.size})`;
        if (item.color) variantInfo += ` (колір: ${item.color})`;
        
        text += `• ${item.product.name}${variantInfo} — ${item.quantity} шт. х ${item.product.price} грн (= ${itemTotal.toFixed(2)} грн)\n`;
    });
    
    text += `\nРазом: ${total.toFixed(2)} грн\n\nВкажіть адресу для доставки та ім'я:`;
    
    const tgUsername = "ElMarino_we"; 
    const encodedText = encodeURIComponent(text);
    const telegramUrl = `https://t.me/${tgUsername}?text=${encodedText}`;
    
    window.location.href = telegramUrl;
    
    setTimeout(() => {
        const textarea = document.createElement('textarea');
        textarea.value = text; document.body.appendChild(textarea);
        textarea.select(); document.execCommand('copy'); document.body.removeChild(textarea);
        alert("Замовлення також скопійовано в буфер обміну!");
    }, 1000);
}

loadProductsFromSheet();
</script>
</body>
</html>
