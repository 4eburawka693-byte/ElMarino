<!DOCTYPE html>
<html lang="uk" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЕльМарино</title>
    
    <!-- Подключение манифеста PWA -->
    <link rel="manifest" href="./manifest.json">
    
    <!-- Скрипты -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pinch-zoom-js@2.3.4/dist/pinch-zoom.umd.min.js"></script>
    
    <!-- Автоматическая регистрация Service Worker для активации установки -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('data:text/javascript;base64,' + btoa(`
            self.addEventListener('fetch', (e) => {
              e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
            });
          `));
        });
      }
    </script>

    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .product-card { transition: all 0.2s ease; cursor: pointer; }
        .product-card:active { transform: scale(0.98); }
        .clamp-desc {
            display: -webkit-box !important;
            -webkit-line-clamp: 2 !important;
            -webkit-box-orient: vertical !important;
            overflow: hidden !important;
            text-overflow: ellipsis !important;
        }
        .pinch-zoom-container {
            width: 100%;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .zoomable-img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
        }
    </style>
</head>
<body class="bg-gray-100 notranslate">

    <div class="max-w-4xl mx-auto pb-20">
        <div class="w-full overflow-hidden shadow-md">
            <img src="https://i.postimg.cc/KvynpRrT/1782584017691.jpg" alt="ЕльМарино Баннер" class="w-full h-auto">
        </div>

        <header class="bg-purple-700 text-white p-4 sticky top-0 z-40 shadow">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold">🛍️ Магазин ЭльМарино</h1>
                <button onclick="showCart()" class="flex items-center gap-2 bg-white text-purple-700 px-5 py-2 rounded-2xl shadow hover:bg-purple-50 transition font-medium relative">
                    🛒 Кошик
                    <span id="cart-count" class="bg-red-500 text-white text-xs rounded-full px-2 py-0.5 absolute -top-2 -right-2 hidden">0</span>
                </button>
            </div>
        </header>

        <div class="p-4 flex gap-2">
            <input id="search-input" type="text" placeholder="🔍 Пошук товарів..." 
                   class="w-full p-4 rounded-2xl border focus:border-purple-600 outline-none shadow-sm"
                   onkeyup="filterProducts()">
            <button onclick="resetFilters()" class="bg-gray-200 text-gray-700 px-4 rounded-2xl text-sm font-medium hover:bg-gray-300 transition">Всі</button>
        </div>

        <div id="loading-status" class="text-center py-10 text-gray-500 font-medium">
            ⏳ Загрузка товаров и актуальных цен...
        </div>

        <div id="categories" class="p-4 mb-6 grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
        <div id="products" class="px-4 grid grid-cols-2 gap-4"></div>
    </div>

    <!-- Модальное окно товара -->
    <div id="product-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-3">
        <div class="bg-white w-full max-w-md rounded-3xl overflow-hidden shadow-2xl relative max-h-[85vh] flex flex-col">
            <button onclick="hideProductModal()" class="absolute top-4 right-4 bg-black/60 text-white w-9 h-9 rounded-full flex items-center justify-center z-50 hover:bg-black/80 transition text-xl font-bold">&times;</button>
            
            <div class="overflow-y-auto p-0 flex-1 pb-24">
                <div class="w-full h-64 bg-gray-50 flex items-center justify-center overflow-hidden relative cursor-zoom-in">
                    <img id="modal-product-image" src="" class="w-full h-full object-contain" onclick="openZoomModal(this.src)">
                    <button id="prev-photo-btn" onclick="changePhoto(-1); event.stopPropagation();" class="absolute left-2 top-1/2 -translate-y-1/2 bg-black/60 text-white w-10 h-10 rounded-full flex items-center justify-center text-xl font-bold hover:bg-black/80 hidden">&lsaquo;</button>
                    <button id="next-photo-btn" onclick="changePhoto(1); event.stopPropagation();" class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/60 text-white w-10 h-10 rounded-full flex items-center justify-center text-xl font-bold hover:bg-black/80 hidden">&rsaquo;</button>
                    <div id="photo-counter" class="absolute bottom-3 left-1/2 -translate-x-1/2 bg-black/60 text-white px-3 py-1 rounded-full text-xs hidden"></div>
                </div>
                
                <div class="p-5">
                    <h2 id="modal-product-name" class="text-xl font-bold text-gray-900 mb-2"></h2>
                    <div class="flex items-baseline gap-2 mb-4">
                        <span id="modal-product-price" class="text-2xl font-black text-purple-700"></span>
                        <span id="modal-product-unit" class="text-sm text-gray-500"></span>
                    </div>
                    <p id="modal-product-desc" class="text-gray-600 text-sm leading-relaxed whitespace-pre-line"></p>
                </div>
            </div>
            
            <div class="absolute bottom-0 left-0 right-0 p-4 bg-white border-t flex gap-3 items-center shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
                <div class="flex items-center border border-gray-300 rounded-2xl overflow-hidden bg-gray-50">
                    <button onclick="updateModalQty(-1)" class="px-4 py-3 font-bold text-gray-600 hover:bg-gray-200 transition text-lg">-</button>
                    <span id="modal-qty" class="px-4 py-3 font-bold text-gray-900 min-w-[40px] text-center bg-white">1</span>
                    <button onclick="updateModalQty(1)" class="px-4 py-3 font-bold text-gray-600 hover:bg-gray-200 transition text-lg">+</button>
                </div>
                <button id="modal-add-btn" onclick="addModalToCart()" class="flex-1 bg-purple-700 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-purple-800 transition active:scale-[0.99]">
                    Додати в кошик
                </button>
            </div>
        </div>
    </div>

    <!-- Модальное окно кошика -->
    <div id="cart-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-3">
        <div class="bg-white w-full max-w-md rounded-3xl overflow-hidden shadow-2xl relative max-h-[85vh] flex flex-col">
            <header class="p-4 border-b flex justify-between items-center bg-gray-50">
                <h2 class="text-lg font-bold text-gray-900">🛒 Ваш кошик</h2>
                <button onclick="hideCart()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </header>
            
            <div id="cart-items" class="overflow-y-auto p-4 flex-1 divide-y divide-gray-100"></div>
            
            <div class="p-4 bg-gray-50 border-t shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-gray-600 font-medium">Загальна сума:</span>
                    <span id="cart-total" class="text-2xl font-black text-purple-700">0 грн</span>
                </div>
                <button onclick="checkout()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg hover:bg-green-700 transition active:scale-[0.99]">
                    Оформити замовлення у Viber
                </button>
            </div>
        </div>
    </div>

    <!-- Модальное окно увеличения фото -->
    <div id="zoom-modal" class="hidden fixed inset-0 bg-black z-[60] flex items-center justify-center">
        <button onclick="closeZoomModal()" class="absolute top-6 right-6 bg-white/20 text-white w-12 h-12 rounded-full flex items-center justify-center text-2xl font-bold hover:bg-white/30 transition z-50">&times;</button>
        <div class="pinch-zoom-container">
            <img id="zoomed-image" src="" class="zoomable-img">
        </div>
    </div>

    <!-- ОСНОВНОЙ СКРИПТ МАГАЗИНА -->
    <script>
        const SHEET_ID = '1X58m63-6G-b8wO21kXv79M4o7G6zV974P3WJ45H7y9o'; // Твоя рабочая таблица
        const TAB_NAME = 'Products';
        const SCRIPT_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${TAB_NAME}`;

        let allProducts = [];
        let currentCategory = null;
        let cart = JSON.parse(localStorage.getItem('elmarino_cart')) || [];
        let currentModalProduct = null;
        let currentPhotoIndex = 0;
        let zoomPinchInstance = null;

        async function loadProducts() {
            try {
                const response = await fetch(SCRIPT_URL);
                const text = await response.text();
                const jsonText = text.substring(47, text.length - 2);
                const data = JSON.parse(jsonText);
                
                const rows = data.table.rows;
                allProducts = rows.map(row => {
                    const imagesStr = row.c[3]?.v || '';
                    const imagesArr = imagesStr.split(',').map(url => url.trim()).filter(url => url.length > 0);
                    return {
                        id: row.c[0]?.v,
                        name: row.c[1]?.v || '',
                        category: row.c[2]?.v || 'Инше',
                        images: imagesArr.length > 0 ? imagesArr : ['https://via.placeholder.com/400?text=No+Image'],
                        price: parseFloat(row.c[4]?.v) || 0,
                        unit: row.c[5]?.v || 'грн',
                        desc: row.c[6]?.v || '',
                        available: row.c[7]?.v !== 'нет'
                    };
                }).filter(p => p.id && p.available);

                document.getElementById('loading-status').classList.add('hidden');
                renderCategories();
                renderProducts();
                updateCartCount();
            } catch (error) {
                console.error("Ошибка загрузки:", error);
                document.getElementById('loading-status').innerText = '❌ Помилка завантаження даних. Спробуйте оновити сторінку.';
            }
        }

        function renderCategories() {
            const categoriesDiv = document.getElementById('categories');
            const uniqueCategories = [...new Set(allProducts.map(p => p.category))];
            
            categoriesDiv.innerHTML = uniqueCategories.map(cat => `
                <button onclick="filterByCategory('${cat}')" 
                        class="category-btn p-3 rounded-2xl text-sm font-semibold border bg-white shadow-sm hover:border-purple-600 transition text-center text-gray-700">
                    ${cat}
                </button>
            `).join('');
        }

        function renderProducts(productsToRender = allProducts) {
            const productsDiv = document.getElementById('products');
            if (productsToRender.length === 0) {
                productsDiv.innerHTML = `<p class="col-span-2 text-center py-10 text-gray-400 font-medium">Товарів не знайдено</p>`;
                return;
            }

            productsDiv.innerHTML = productsToRender.map(p => `
                <div class="product-card bg-white rounded-3xl p-3 shadow-sm border border-gray-100 flex flex-col justify-between" onclick="showProductModal(${p.id})">
                    <div class="w-full h-36 bg-gray-50 rounded-2xl overflow-hidden mb-3 flex items-center justify-center">
                        <img src="${p.images[0]}" alt="${p.name}" class="w-full h-full object-contain">
                    </div>
                    <div>
                        <h3 class="font-bold text-gray-800 text-sm clamp-desc mb-1">${p.name}</h3>
                        <div class="flex items-baseline gap-1 mb-2">
                            <span class="text-lg font-black text-purple-700">${p.price}</span>
                            <span class="text-xs text-gray-500">${p.unit}</span>
                        </div>
                    </div>
                    <button class="w-full bg-purple-50 text-purple-700 py-2.5 rounded-xl font-bold text-xs hover:bg-purple-700 hover:text-white transition" onclick="event.stopPropagation(); quickAddToCart(${p.id})">
                        В кошик
                    </button>
                </div>
            `).join('');
        }

        function filterByCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.category-btn').forEach(btn => {
                if(btn.innerText.trim() === category) {
                    btn.classList.add('bg-purple-700', 'text-white', 'border-purple-700');
                } else {
                    btn.classList.remove('bg-purple-700', 'text-white', 'border-purple-700');
                }
            });
            const filtered = allProducts.filter(p => p.category === category);
            renderProducts(filtered);
        }

        function resetFilters() {
            currentCategory = null;
            document.getElementById('search-input').value = '';
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('bg-purple-700', 'text-white', 'border-purple-700'));
            renderProducts(allProducts);
        }

        function filterProducts() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            let filtered = allProducts;
            if (currentCategory) filtered = filtered.filter(p => p.category === currentCategory);
            if (query) filtered = filtered.filter(p => p.name.toLowerCase().includes(query) || p.desc.toLowerCase().includes(query));
            renderProducts(filtered);
        }

        function showProductModal(id) {
            const p = allProducts.find(prod => prod.id == id);
            if (!p) return;
            currentModalProduct = p;
            currentPhotoIndex = 0;

            document.getElementById('modal-product-name').innerText = p.name;
            document.getElementById('modal-product-price').innerText = `${p.price} грн`;
            document.getElementById('modal-product-unit').innerText = ` / ${p.unit}`;
            document.getElementById('modal-product-desc').innerText = p.desc;
            document.getElementById('modal-qty').innerText = "1";

            updateModalPhotos();
            document.getElementById('product-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function updateModalPhotos() {
            const img = document.getElementById('modal-product-image');
            const prevBtn = document.getElementById('prev-photo-btn');
            const nextBtn = document.getElementById('next-photo-btn');
            const counter = document.getElementById('photo-counter');
            const photos = currentModalProduct.images;

            img.src = photos[currentPhotoIndex];

            if (photos.length > 1) {
                prevBtn.classList.remove('hidden');
                nextBtn.classList.remove('hidden');
                counter.classList.remove('hidden');
                counter.innerText = `${currentPhotoIndex + 1} из ${photos.length}`;
            } else {
                prevBtn.classList.add('hidden');
                nextBtn.classList.add('hidden');
                counter.classList.add('hidden');
            }
        }

        function changePhoto(direction) {
            const photos = currentModalProduct.images;
            currentPhotoIndex += direction;
            if (currentPhotoIndex < 0) currentPhotoIndex = photos.length - 1;
            if (currentPhotoIndex >= photos.length) currentPhotoIndex = 0;
            updateModalPhotos();
        }

        function hideProductModal() {
            document.getElementById('product-modal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        function updateModalQty(change) {
            const qtySpan = document.getElementById('modal-qty');
            let currentQty = parseInt(qtySpan.innerText);
            currentQty += change;
            if (currentQty < 1) currentQty = 1;
            qtySpan.innerText = currentQty;
        }

        function quickAddToCart(id) {
            const p = allProducts.find(prod => prod.id == id);
            if (!p) return;
            const existing = cart.find(item => item.id == id);
            if (existing) existing.qty += 1;
            else cart.push({ ...p, qty: 1 });
            saveCart();
        }

        function addModalToCart() {
            const qty = parseInt(document.getElementById('modal-qty').innerText);
            const existing = cart.find(item => item.id == currentModalProduct.id);
            if (existing) existing.qty += qty;
            else cart.push({ ...currentModalProduct, qty: qty });
            saveCart();
            hideProductModal();
        }

        function saveCart() {
            localStorage.setItem('elmarino_cart', JSON.stringify(cart));
            updateCartCount();
        }

        function updateCartCount() {
            const countSpan = document.getElementById('cart-count');
            const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
            if (totalItems > 0) {
                countSpan.innerText = totalItems;
                countSpan.classList.remove('hidden');
            } else {
                countSpan.classList.add('hidden');
            }
        }

        function showCart() {
            const modal = document.getElementById('cart-modal');
            const itemsDiv = document.getElementById('cart-items');
            const totalSpan = document.getElementById('cart-total');

            if (cart.length === 0) {
                itemsDiv.innerHTML = `<p class="text-center py-8 text-gray-400 font-medium">Кошик порожній</p>`;
                totalSpan.innerText = '0 грн';
            } else {
                let total = 0;
                itemsDiv.innerHTML = cart.map((item, index) => {
                    const itemTotal = item.price * item.qty;
                    total += itemTotal;
                    return `
                        <div class="flex items-center gap-3 py-3">
                            <img src="${item.images[0]}" class="w-12 h-12 rounded-xl object-contain bg-gray-50">
                            <div class="flex-1 min-w-0">
                                <h4 class="font-bold text-sm text-gray-800 truncate">${item.name}</h4>
                                <p class="text-xs text-gray-500">${item.price} грн / ${item.unit}</p>
                            </div>
                            <div class="flex items-center border rounded-xl overflow-hidden bg-white scale-90">
                                <button onclick="changeCartQty(${index}, -1)" class="px-2 py-1 font-bold text-gray-500 bg-gray-50 hover:bg-gray-100">-</button>
                                <span class="px-3 font-bold text-sm text-gray-800">${item.qty}</span>
                                <button onclick="changeCartQty(${index}, 1)" class="px-2 py-1 font-bold text-gray-500 bg-gray-50 hover:bg-gray-100">+</button>
                            </div>
                            <span class="font-black text-sm text-purple-700 min-w-[60px] text-right">${itemTotal} ₴</span>
                        </div>
                    `;
                }).join('');
                totalSpan.innerText = `${total} грн`;
            }

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function hideCart() {
            document.getElementById('cart-modal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        function changeCartQty(index, change) {
            cart[index].qty += change;
            if (cart[index].qty <= 0) cart.splice(index, 1);
            saveCart();
            showCart();
        }

        function checkout() {
            if (cart.length === 0) return;
            let total = 0;
            let text = `📦 *Нове замовлення ЕльМарино*:\n\n`;
            
            cart.forEach((item, i) => {
                const cost = item.price * item.qty;
                total += cost;
                text += `${i + 1}. ${item.name}\n   ${item.qty} шт х ${item.price} грн = ${cost} грн\n`;
            });

            text += `\n💰 *Разом до сплати:* ${total} грн`;
            
            const viberUrl = `viber://forward?text=${encodeURIComponent(text)}`;
            window.location.href = viberUrl;
        }

        function openZoomModal(src) {
            const modal = document.getElementById('zoom-modal');
            const img = document.getElementById('zoomed-image');
            img.src = src;
            modal.classList.remove('hidden');
            
            setTimeout(() => {
                const container = document.querySelector('.pinch-zoom-container');
                if (container) {
                    zoomPinchInstance = new PinchZoom(container, {
                        draggableUnzoomed: false,
                        minScale: 1,
                        maxScale: 4
                    });
                }
            }, 50);
        }

        function closeZoomModal() {
            document.getElementById('zoom-modal').classList.add('hidden');
            if (zoomPinchInstance) {
                zoomPinchInstance.destroy();
                zoomPinchInstance = null;
            }
        }

        window.onload = loadProducts;
    </script>
</body>
</html>
