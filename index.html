<!DOCTYPE html>
<html lang="uk" class="notranslate" translate="no">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ElMarino Магазин</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/pinch-zoom-js@2.3.4/dist/pinch-zoom.umd.min.js"></script>
<style>
body { font-family: system-ui, sans-serif; }
.product-card { transition: all 0.2s ease; cursor: pointer; }
.product-card:active { transform: scale(0.98); }
.clamp-desc {
display: -webkit-box !important;
-webkit-line-clamp: 2 !important;
-webkit-box-orient: vertical !important;
overflow: hidden !important;
text-overflow: ellipsis !important;
}
.pinch-zoom-container {
width: 100%;
height: 80vh;
display: flex;
align-items: center;
justify-content: center;
}
.zoomable-img {
max-width: 100%;
max-height: 80vh;
object-fit: contain;
}
</style>
</head>
<body class="bg-gray-100 notranslate">

<div class="max-w-4xl mx-auto pb-20">
<div class="w-full overflow-hidden shadow-sm">
<img src="https://i.postimg.cc/KvynpRrT/1782584017691.jpg" alt="ElMarino Banner" class="w-full h-auto object-cover block" loading="eager">
</div>

<header class="bg-zinc-800 text-white p-4 sticky top-0 z-40 shadow-md">
<div class="flex justify-between items-center">
<div class="flex items-center gap-2">
<button onclick="goHome()" class="flex items-center justify-center w-10 h-10 bg-zinc-700 active:bg-zinc-600 rounded-2xl border border-zinc-600 shadow-inner transition-colors">
🏠
</button>
<h1 class="text-xl font-bold tracking-wide flex items-center gap-1 ml-1">
ElMarino <span class="text-amber-400 font-medium">Магазин</span>
</h1>
</div>
<button onclick="showCart()" class="flex items-center gap-2 bg-zinc-700 active:bg-zinc-600 border border-zinc-600 px-4 py-2 rounded-2xl font-medium transition-colors">
🛒 <span id="cart-count" class="bg-amber-500 text-zinc-900 text-xs rounded-full px-2 py-0.5 font-bold">0</span>
</button>
</div>
</header>

<div class="p-4 flex flex-col gap-3">
<div class="flex gap-2 items-center">
<div class="relative flex-1">
<input id="search" type="text" placeholder="🔍 Пошук товарів..."
class="w-full p-3.5 pl-4 rounded-2xl border focus:border-zinc-500 outline-none shadow-sm text-sm"
onkeyup="filterProducts()">
</div>
<button onclick="resetFilters()" class="bg-zinc-200 text-zinc-700 h-12 px-4 rounded-2xl text-sm font-medium hover:bg-zinc-300 transition-colors">Всі</button>

<div class="relative">
<button onclick="toggleSortMenu()" class="w-12 h-12 bg-zinc-200 text-zinc-700 rounded-2xl text-base font-medium hover:bg-zinc-300 transition-colors flex items-center justify-center shadow-sm">
📊
</button>
<div id="sort-menu" class="hidden absolute right-0 mt-2 w-52 bg-white rounded-2xl shadow-xl border z-50 overflow-hidden">
<button onclick="setSortOrder('default')" class="w-full text-left px-4 py-3 text-sm text-zinc-700 hover:bg-zinc-50 border-b block">Без сортування</button>
<button onclick="setSortOrder('low-to-high')" class="w-full text-left px-4 py-3 text-sm text-zinc-700 hover:bg-zinc-50 border-b block">💰 Від дешевих до дорогих</button>
<button onclick="setSortOrder('high-to-low')" class="w-full text-left px-4 py-3 text-sm text-zinc-700 hover:bg-zinc-50 block">💵 Від дорогих до дешевих</button>
</div>
</div>
</div>

<div id="filter-indicator" class="text-xs text-zinc-600 px-3 py-2 hidden flex justify-between items-center bg-zinc-50 rounded-xl border">
<span id="filter-indicator-text"></span>
<button onclick="goHome()" class="text-amber-600 font-bold ml-2">Скинути ✕</button>
</div>
</div>

<div id="categories" class="px-4 mb-6 grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
<div id="products" class="px-4 grid grid-cols-2 gap-4"></div>
</div>

<div id="product-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-3" onclick="hideProductModal()">
<div class="bg-white w-full max-w-md rounded-3xl overflow-hidden shadow-2xl relative max-h-[85vh] flex flex-col" onclick="event.stopPropagation()">
<button onclick="hideProductModal()" class="absolute top-4 right-4 bg-black/60 text-white w-9 h-9 rounded-full flex items-center justify-center text-sm font-bold z-50 shadow-lg border border-white/20">✕</button>

<div class="overflow-y-auto p-0 flex-1 pb-24">
<div id="modal-swipe-zone" class="w-full h-64 bg-zinc-50 flex items-center justify-center overflow-hidden relative cursor-zoom-in">
<img id="modal-product-image" src="" class="max-w-full max-h-full object-contain" onclick="openFullscreenPhoto()">
<button id="prev-photo-btn" onclick="changePhoto(-1); event.stopPropagation();" class="absolute left-3 bg-black/40 text-white w-9 h-9 rounded-full flex items-center justify-center font-bold text-lg active:bg-black/60 select-none">＜</button>
<button id="next-photo-btn" onclick="changePhoto(1); event.stopPropagation();" class="absolute right-3 bg-black/40 text-white w-9 h-9 rounded-full flex items-center justify-center font-bold text-lg active:bg-black/60 select-none">＞</button>
<span id="photo-counter" class="absolute bottom-3 right-3 bg-black/60 text-white text-xs px-2.5 py-1 rounded-full font-medium"></span>
</div>

<div class="p-4">
<span id="modal-product-category" class="text-xs font-bold uppercase tracking-wider text-zinc-700 bg-amber-100/70 text-[#8a6d29] px-2.5 py-1 rounded-md"></span>
<h2 id="modal-product-name" class="text-xl font-bold text-zinc-800 mt-3 leading-tight"></h2>
<p id="modal-product-description" class="text-zinc-600 text-sm mt-2 whitespace-pre-line"></p>

<div id="size-selector-block" class="hidden mt-4 flex items-center gap-3 bg-zinc-50 p-2 rounded-xl justify-between">
<span class="text-zinc-600 font-medium text-sm pl-2">Оберіть розмір:</span>
<select id="modal-size-select" class="p-2 rounded-lg border bg-white font-bold text-zinc-700 outline-none focus:border-zinc-500 min-w-[140px]"></select>
</div>

<div id="color-selector-block" class="hidden mt-4 flex items-center gap-3 bg-zinc-50 p-2 rounded-xl justify-between">
<span class="text-zinc-600 font-medium text-sm pl-2">Оберіть колір:</span>
<select id="modal-color-select" class="p-2 rounded-lg border bg-white font-bold text-zinc-700 outline-none focus:border-zinc-500 min-w-[140px]" onchange="syncPhotoByColor()"></select>
</div>

<div class="mt-4 flex items-center gap-3 bg-zinc-50 p-2 rounded-xl justify-between">
<span class="text-zinc-600 font-medium text-sm pl-2">Кількість:</span>
<div class="flex items-center gap-1">
<button onclick="changeModalQty(-1)" class="w-10 h-10 bg-white rounded-lg border font-bold text-xl active:bg-zinc-100 shadow-sm">-</button>
<span id="modal-qty" class="w-12 text-center font-bold text-zinc-800 text-lg">1</span>
<button onclick="changeModalQty(1)" class="w-10 h-10 bg-white rounded-lg border font-bold text-xl active:bg-zinc-100 shadow-sm">+</button>
</div>
</div>
</div>
</div>

<div class="absolute bottom-0 left-0 right-0 bg-white border-t p-4 flex items-center justify-between gap-4 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-20">
<div>
<span class="text-zinc-400 text-xs block">Ціна</span>
<span id="modal-product-price" class="text-xl font-black text-zinc-800"></span>
</div>
<button id="modal-product-btn" class="flex-1 bg-zinc-800 active:bg-zinc-700 text-white py-3.5 rounded-2xl font-bold transition-all shadow-lg text-center">
Додати в кошик
</button>
</div>
</div>
</div>

<div id="fullscreen-lightbox" class="hidden fixed inset-0 bg-black/95 z-[60] flex flex-col items-center justify-center p-4" onclick="closeFullscreenPhoto()">
<button onclick="closeFullscreenPhoto()" class="fixed top-6 right-6 text-white text-3xl font-light hover:text-zinc-300 z-[70] bg-black/40 w-12 h-12 rounded-full flex items-center justify-center">✕</button>
<div id="lightbox-content-area" class="w-full flex items-center justify-center"></div>
<button id="lightbox-prev-btn" onclick="changePhoto(-1); updateLightboxImage(); event.stopPropagation();" class="fixed left-2 top-1/2 -translate-y-1/2 bg-black/40 text-white w-12 h-12 rounded-full flex items-center justify-center font-bold text-xl select-none z-[65]">＜</button>
<button id="lightbox-next-btn" onclick="changePhoto(1); updateLightboxImage(); event.stopPropagation();" class="fixed right-2 top-1/2 -translate-y-1/2 bg-black/40 text-white w-12 h-12 rounded-full flex items-center justify-center font-bold text-xl select-none z-[65]">＞</button>
</div>

<div id="cart-modal" class="hidden fixed inset-0 bg-black/70 flex items-end z-50" onclick="hideCart()">
<div class="bg-white w-full rounded-t-3xl max-h-[85vh] overflow-auto p-5 flex flex-col" onclick="event.stopPropagation()">
<div class="flex justify-between mb-4 items-center">
<h
